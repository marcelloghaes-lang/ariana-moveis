<div id="category-management">
    <h2>Gerenciar Categorias</h2>

    <div class="p-4 border mb-6">
        <h3 class="text-lg font-bold mb-2">Adicionar Nova Categoria</h3>
        <input type="text" id="category-name-input" placeholder="Nome da Categoria" class="border p-2 w-full mb-3">
        <button onclick="handleSaveCategory()" class="bg-primary-blue text-white p-2 rounded">
            Salvar Categoria
        </button>
    </div>

    <h3 class="text-lg font-bold mb-2">Categorias Atuais:</h3>
    <ul id="category-list-container" class="border p-4">
        <li>Carregando categorias...</li>
    </ul>
</div>

<script>
    // Conecte esta função ao botão de salvar no HTML
    window.handleSaveCategory = function() {
        const name = document.getElementById('category-name-input').value;
        saveCategory(name);
    }

    // Chame esta função ao carregar a página de categorias
    // loadCategories();
</script>
