
<!DOCTYPE html>
<html>
<head>
  <title>Painel de Banners</title>
</head>
<body>

<h2>Banners</h2>

<input id="slot" placeholder="slot (ex: hero)">
<input id="image" placeholder="URL imagem">
<input id="link" placeholder="link">

<button onclick="salvar()">Salvar</button>

<script>
const API = "http://localhost:3000";

async function salvar(){
  const data = [{
    slot: document.getElementById('slot').value,
    imageUrl: document.getElementById('image').value,
    linkUrl: document.getElementById('link').value,
    active: true
  }];

  await fetch(API + "/banners/bulk", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(data)
  });

  alert("Salvo!");
}
</script>

</body>
</html>
