<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Admin • Ariana Móveis</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary-blue": "#2b5c88",
            "secondary-light-blue": "#e8f1fb",
            "dark-bg": "#0f172a"
          },
          boxShadow: {
            soft: "0 10px 30px rgba(2, 6, 23, .10)"
          }
        }
      }
    };
  </script>

  <style>
    .ring-soft { box-shadow: 0 0 0 6px rgba(43,92,136,.08); }
  </style>
</head>

<body class="min-h-screen bg-slate-50 text-slate-800">

  <header class="bg-dark-bg text-white">
    <div class="max-w-6xl mx-auto px-4 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-white/10 flex items-center justify-center ring-soft">
          <i class="fa-solid fa-shield-halved text-white"></i>
        </div>
        <div class="leading-tight">
          <div class="font-black tracking-wide">ADMIN • ARIANA MÓVEIS</div>
          <div class="text-white/70 text-xs font-semibold">Acesso Restrito</div>
        </div>
      </div>

      <a href="index.html" class="text-sm font-black hover:underline text-white/90">
        Voltar ao site
      </a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-10">
    <div class="grid lg:grid-cols-2 gap-8 items-center">

      <section class="order-2 lg:order-1">
        <div class="bg-white rounded-2xl shadow-soft p-7 border border-slate-100">
          <h1 class="text-2xl sm:text-3xl font-black text-slate-900">
            Login do Administrador
          </h1>
          <p class="mt-3 text-slate-600 leading-relaxed">
            Este acesso é apenas para administração do marketplace.
          </p>
        </div>
      </section>

      <section class="order-1 lg:order-2">
        <div class="bg-white rounded-2xl shadow-soft border border-slate-100 overflow-hidden">
          <div class="p-7">

            <form id="login-form" class="mt-6 space-y-4">
              <input id="email" type="email" placeholder="Email" class="w-full border px-3 py-2 rounded"/>
              <input id="password" type="password" placeholder="Senha" class="w-full border px-3 py-2 rounded"/>

              <button id="btnLogin" class="w-full bg-primary-blue text-white py-2 rounded">
                Entrar
              </button>
            </form>

          </div>
        </div>
      </section>

    </div>
  </main>

  <script>
    const API_BASE =
      localStorage.getItem("API_BASE") ||
      "https://ariana-move-mongo.onrender.com/api";

    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch(API_BASE + "/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        alert("Erro login");
        return;
      }

      localStorage.setItem("adminToken", data.token);
      window.location.href = "admin_painel.html";
    });
  </script>

</body>
</html>
