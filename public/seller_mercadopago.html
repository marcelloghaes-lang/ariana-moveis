<script>
const API_BASE =
  window.API_BASE ||
  localStorage.getItem("API_BASE") ||
  "http://localhost:3000/api";

const $ = (id)=>document.getElementById(id);

function toast(message, type="info"){
  const container = $("toast-container");
  if(!container){ alert(message); return; }

  const el = document.createElement("div");
  const map = { success:"bg-success-green", error:"bg-error-red", info:"bg-primary-blue" };

  el.className = `toast p-4 rounded-lg text-white ${map[type]} animate-fade`;
  el.textContent = message;

  container.appendChild(el);

  setTimeout(()=>{
    el.style.opacity="0";
    setTimeout(()=>el.remove(),300);
  },3500);
}

function showError(msg){
  const b = $("error-box");
  if(!b) return;
  b.textContent = msg;
  b.classList.remove("hidden");
  $("ok-box")?.classList.add("hidden");
}

function showOk(msg){
  const b = $("ok-box");
  if(!b) return;
  b.textContent = msg;
  b.classList.remove("hidden");
  $("error-box")?.classList.add("hidden");
}

function setMpStatus(kind, text, detail=""){
  const el = $("mp-status");
  if(!el) return;

  const dot = el.querySelector("span");

  el.className = "mt-1 inline-flex items-center gap-2 px-3 py-1 rounded-full font-extrabold text-sm";

  if(kind==="ok"){
    el.classList.add("bg-green-100","text-green-700");
    if(dot) dot.className="w-2 h-2 rounded-full bg-green-500";
  }else if(kind==="warn"){
    el.classList.add("bg-amber-100","text-amber-700");
    if(dot) dot.className="w-2 h-2 rounded-full bg-amber-500";
  }else if(kind==="err"){
    el.classList.add("bg-red-100","text-red-700");
    if(dot) dot.className="w-2 h-2 rounded-full bg-red-500";
  }else{
    el.classList.add("bg-slate-100","text-slate-700");
    if(dot) dot.className="w-2 h-2 rounded-full bg-slate-400";
  }

  el.childNodes.forEach(n=>{
    if(n.nodeType===3) n.textContent=" "+text;
  });

  $("mp-detail").textContent = detail || "";
}

// ===== TOKEN DO SELLER =====
function getToken(){
  return localStorage.getItem("seller_token") || "";
}

// ===== STATUS =====
async function loadStatus(){
  try{
    const res = await fetch(API_BASE + "/seller/mp/status",{
      headers:{ Authorization:`Bearer ${getToken()}` }
    });

    const data = await res.json();

    if(data.connected){
      setMpStatus("ok","Conectado","Split automático ativo");
      $("btn-connect").disabled = true;
    }else{
      setMpStatus("warn","Não conectado","Clique para conectar");
      $("btn-connect").disabled = false;
    }

  }catch(e){
    showError("Erro ao verificar status.");
  }
}

// ===== CONECTAR =====
async function connectMp(){
  try{
    const btn = $("btn-connect");
    btn.disabled=true;
    btn.innerHTML="Conectando...";

    const res = await fetch(API_BASE + "/seller/mp/connect",{
      headers:{ Authorization:`Bearer ${getToken()}` }
    });

    const data = await res.json();

    if(!data.url) throw new Error();

    window.location.href = data.url;

  }catch(e){
    showError("Erro ao conectar Mercado Pago.");
    $("btn-connect").disabled=false;
    $("btn-connect").innerHTML="Conectar Mercado Pago";
  }
}

// ===== REFRESH =====
async function refresh(){
  await loadStatus();
  showOk("Atualizado.");
}

// ===== EVENTOS =====
$("btn-connect")?.addEventListener("click", connectMp);
$("btn-refresh")?.addEventListener("click", refresh);

// ===== LOGOUT =====
$("btn-sair")?.addEventListener("click", ()=>{
  localStorage.removeItem("seller_token");
  window.location.href="seller_login.html";
});

// ===== INIT =====
document.getElementById("year").textContent = new Date().getFullYear();
loadStatus();

</script>
