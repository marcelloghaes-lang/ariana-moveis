<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Atendimentos | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .bg-dark-bg { background-color: #1D2B3A; }
        .text-primary-blue { color: #2E6DA4; }
        .status-novo { background-color: #fee2e2; color: #991b1b; } /* Vermelho claro */
        .status-respondido { background-color: #dcfce7; color: #166534; } /* Verde claro */
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="flex-1 flex flex-col p-6">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold text-dark-bg flex items-center">
                    <i class="fas fa-headset mr-3 text-primary-blue"></i> SAC & Ouvidoria
                </h1>
                <p class="text-gray-600">Gerencie os contatos recebidos pelos formulários do site.</p>
            </div>
            <button onclick="location.reload()" class="bg-primary-blue text-white px-4 py-2 rounded-xl font-bold hover:bg-dark-bg transition-all">
                <i class="fas fa-sync-alt mr-2"></i> Atualizar
            </button>
        </header>

        <div class="flex gap-4 mb-6">
            <span id="total-sac" class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 text-sm font-bold">SAC: 0</span>
            <span id="total-ouvidoria" class="bg-white px-4 py-2 rounded-lg shadow-sm border border-gray-200 text-sm font-bold">Ouvidoria: 0</span>
        </div>

        <div id="lista-atendimentos" class="space-y-4">
            <div class="text-center py-10 text-gray-500">Carregando mensagens...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, query, orderBy, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhwqDaCVUNLQ0cg863fw251ZAjBWZ8WCo",
            authDomain: "ariana-moveis-final.firebaseapp.com",
            projectId: "ariana-moveis-final",
            storageBucket: "ariana-moveis-final.firebasestorage.app",
            messagingSenderId: "695257365498",
            appId: "1:695257365498:web:8e68494de6c4c99c67c70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function carregarAtendimentos() {
            const container = document.getElementById('lista-atendimentos');
            const q = query(collection(db, "atendimentos"), orderBy("data", "desc"));
            
            try {
                const querySnapshot = await getDocs(q);
                container.innerHTML = '';
                
                let sacCount = 0;
                let ouvidoriaCount = 0;

                if (querySnapshot.empty) {
                    container.innerHTML = '<div class="text-center py-10">Nenhuma mensagem recebida ainda.</div>';
                    return;
                }

                querySnapshot.forEach((d) => {
                    const data = d.data();
                    if(data.tipo === "SAC") sacCount++; else ouvidoriaCount++;

                    const card = `
                        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex flex-col md:flex-row justify-between gap-4">
                            <div class="flex-1">
                                <div class="flex items-center gap-2 mb-2">
                                    <span class="px-3 py-1 rounded-full text-xs font-bold ${data.tipo === 'Ouvidoria' ? 'bg-orange-100 text-orange-700' : 'bg-blue-100 text-blue-700'}">
                                        ${data.tipo}
                                    </span>
                                    <span class="text-xs text-gray-400">${data.data?.toDate().toLocaleString('pt-BR')}</span>
                                    <span class="text-xs font-bold px-2 py-1 rounded ${data.status === 'Novo' ? 'status-novo' : 'status-respondido'}">
                                        ${data.status}
                                    </span>
                                </div>
                                <h3 class="font-bold text-gray-800">${data.nome} <span class="text-gray-400 font-normal text-sm">(${data.email})</span></h3>
                                <p class="text-sm text-gray-500 mt-1"><strong>Pedido:</strong> ${data.pedido || 'Não informado'}</p>
                                <div class="mt-3 p-3 bg-gray-50 rounded-lg text-gray-700 text-sm border-l-4 border-primary-blue">
                                    "${data.mensagem}"
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <a href="mailto:${data.email}?subject=Resposta Ariana Móveis - ${data.tipo}" 
                                   onclick="marcarComoLido('${d.id}')"
                                   class="bg-primary-blue text-white px-4 py-2 rounded-xl text-sm font-bold hover:bg-dark-bg transition-all">
                                    <i class="fas fa-reply mr-2"></i> Responder
                                </a>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', card);
                });

                document.getElementById('total-sac').textContent = `SAC: ${sacCount}`;
                document.getElementById('total-ouvidoria').textContent = `Ouvidoria: ${ouvidoriaCount}`;

            } catch (error) {
                console.error("Erro ao carregar:", error);
                container.innerHTML = '<div class="text-center py-10 text-red-500">Erro ao carregar mensagens.</div>';
            }
        }

        // Função para atualizar o status no Firebase ao clicar em responder
        window.marcarComoLido = async (docId) => {
            const docRef = doc(db, "atendimentos", docId);
            await updateDoc(docRef, { status: "Respondido" });
        };

        carregarAtendimentos();
    </script>
</body>
</html>
