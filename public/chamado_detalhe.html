<body class="bg-fundo-claro font-sans text-text-dark">

  <header class="bg-dark-bg border-b-4 border-primary-blue py-6 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <h1 class="text-white text-xl font-black uppercase">Protocolo de Atendimento</h1>
      <a href="meus_chamados.html" class="bg-primary-blue text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-white hover:text-dark-bg transition">VOLTAR</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-10">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white rounded-3xl p-6 custom-shadow border border-gray-200">
          <div class="flex justify-between items-start border-b border-gray-100 pb-4 mb-6">
            <div>
              <h2 id="title" class="text-2xl font-black text-dark-bg uppercase tracking-tight">Carregando Assunto...</h2>
              <p id="subtitle" class="text-gray-500 font-bold text-sm mt-1 uppercase"></p>
            </div>
            <span id="statusPill" class="px-4 py-1 rounded-full text-[10px] font-black uppercase text-white bg-primary-blue">Aberto</span>
          </div>

          <div id="chat" class="space-y-4 h-[500px] overflow-y-auto px-2 mb-6 flex flex-col">
            </div>

          <form id="replyForm" class="border-t border-gray-100 pt-6">
            <label class="block text-xs font-black text-dark-bg uppercase mb-2">Sua Mensagem</label>
            <textarea id="reply" rows="3" class="w-full border-2 border-gray-200 p-4 rounded-2xl focus:border-primary-blue outline-none font-bold text-dark-bg mb-4" placeholder="Escreva aqui sua dúvida ou resposta..."></textarea>
            
            <div class="flex flex-wrap gap-3">
              <button type="submit" class="bg-primary-blue text-white px-8 py-3 rounded-xl font-black uppercase text-sm hover:bg-dark-bg transition shadow-lg shadow-blue-900/20">
                Enviar Resposta
              </button>
              <button type="button" id="btnAnexo" class="bg-gray-100 text-dark-bg px-6 py-3 rounded-xl font-black uppercase text-sm hover:bg-gray-200 transition">
                Anexar Foto
              </button>
              <button type="button" id="btnClose" class="ml-auto text-red-600 font-black uppercase text-xs hover:underline">
                Encerrar Chamado
              </button>
            </div>
            <input id="attach" type="file" accept="image/*" class="hidden"/>
          </form>
        </div>
      </div>

      <aside class="space-y-6">
        <div class="bg-dark-bg text-white rounded-3xl p-8 custom-shadow">
          <h3 class="text-primary-blue font-black uppercase text-sm mb-6 tracking-widest">Informações Técnicas</h3>
          
          <div class="space-y-6">
            <div>
              <p class="text-gray-400 text-[10px] font-black uppercase">ID do Chamado</p>
              <p id="tId" class="text-lg font-bold font-mono text-secondary-light-blue">#---</p>
            </div>
            <div>
              <p class="text-gray-400 text-[10px] font-black uppercase">Número do Pedido</p>
              <p id="tOrder" class="text-lg font-bold">---</p>
            </div>
            <div>
              <p class="text-gray-400 text-[10px] font-black uppercase">Data de Abertura</p>
              <p id="tCreated" class="text-lg font-bold">---</p>
            </div>
            <div class="pt-4 border-t border-gray-700">
              <p class="text-gray-400 text-xs leading-relaxed italic">
                Nosso suporte comercial responde em até 24h úteis. Fique atento a este painel.
              </p>
            </div>
          </div>
        </div>
      </aside>

    </div>
  </main>

  <div id="toast" class="fixed bottom-6 right-6 bg-dark-bg text-white px-6 py-4 rounded-2xl font-bold shadow-2xl translate-y-20 opacity-0 transition-all duration-300"></div>
