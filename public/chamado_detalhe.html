<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Início | ARIANA MÓVEIS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="/favicon.png">

  <link rel="stylesheet" href="css/tailwind.min.css">
</head>

<body class="bg-fundo-claro font-sans text-text-dark">

  <header class="bg-dark-bg border-b-4 border-primary-blue py-6 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 flex justify-between items-center">
      <h1 class="text-white text-xl font-black uppercase">Protocolo de Atendimento</h1>
      <a href="meus_chamados.html" class="bg-primary-blue text-white px-4 py-2 rounded-lg font-bold text-sm hover:bg-white hover:text-dark-bg transition">VOLTAR</a>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-10">
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white rounded-3xl p-6 custom-shadow border border-gray-200">
          <div class="flex justify-between items-start border-b border-gray-100 pb-4 mb-6">
            <div>
              <h2 id="title" class="text-2xl font-black text-dark-bg uppercase tracking-tight">Carregando Assunto...</h2>
              <p id="subtitle" class="text-gray-500 font-bold text-sm mt-1 uppercase"></p>
            </div>
            <span id="statusPill" class="px-4 py-1 rounded-full text-[10px] font-black uppercase text-white bg-primary-blue">Aberto</span>
          </div>

          <div id="chat" class="space-y-4 h-[500px] overflow-y-auto px-2 mb-6 flex flex-col">
            </div>

          <form id="replyForm" class="border-t border-gray-100 pt-6">
            <label class="block text-xs font-black text-dark-bg uppercase mb-2">Sua Mensagem</label>
            <textarea id="reply" rows="3" class="w-full border-2 border-gray-200 p-4 rounded-2xl focus:border-primary-blue outline-none font-bold text-dark-bg mb-4" placeholder="Escreva aqui sua dúvida ou resposta..."></textarea>
            
            <div class="flex flex-wrap gap-3">
              <button type="submit" class="bg-primary-blue text-white px-8 py-3 rounded-xl font-black uppercase text-sm hover:bg-dark-bg transition shadow-lg shadow-blue-900/20">
                Enviar Resposta
              </button>
              <button type="button" id="btnAnexo" class="bg-gray-100 text-dark-bg px-6 py-3 rounded-xl font-black uppercase text-sm hover:bg-gray-200 transition">
                Anexar Foto
              </button>
              <button type="button" id="btnClose" class="ml-auto text-red-600 font-black uppercase text-xs hover:underline">
                Encerrar Chamado
              </button>
            </div>
            <input id="attach" type="file" accept="image/*" class="hidden"/>
          </form>
        </div>
      </div>

      <aside class="space-y-6">
        <div class="bg-dark-bg text-white rounded-3xl p-8 custom-shadow">
          <h3 class="text-primary-blue font-black uppercase text-sm mb-6 tracking-widest">Informações Técnicas</h3>
          
          <div class="space-y-6">
            <div>
              <p class="text-gray-400 text-[10px] font-black uppercase">ID do Chamado</p>
              <p id="tId" class="text-lg font-bold font-mono text-secondary-light-blue">#---</p>
            </div>
            <div>
              <p class="text-gray-400 text-[10px] font-black uppercase">Número do Pedido</p>
              <p id="tOrder" class="text-lg font-bold">---</p>
            </div>
            <div>
              <p class="text-gray-400 text-[10px] font-black uppercase">Data de Abertura</p>
              <p id="tCreated" class="text-lg font-bold">---</p>
            </div>
            <div class="pt-4 border-t border-gray-700">
              <p class="text-gray-400 text-xs leading-relaxed italic">
                Nosso suporte comercial responde em até 24h úteis. Fique atento a este painel.
              </p>
            </div>
          </div>
        </div>
      </aside>

    </div>
  </main>

  <div id="toast" class="fixed bottom-6 right-6 bg-dark-bg text-white px-6 py-4 rounded-2xl font-bold shadow-2xl translate-y-20 opacity-0 transition-all duration-300"></div>


  <script>
    const API_BASE =
      localStorage.getItem("API_BASE") ||
      window.API_BASE ||
      "https://ariana-move-mongo.onrender.com/api";

    window.API_BASE = API_BASE;

    const $ = (id) => document.getElementById(id);
    const params = new URLSearchParams(window.location.search);
    const ticketId = params.get("id") || params.get("ticketId") || "";

    let currentTicket = null;

    const showToast = (msg) => {
      const el = $("toast");
      el.textContent = msg;
      el.classList.remove("translate-y-20", "opacity-0");
      setTimeout(() => el.classList.add("translate-y-20", "opacity-0"), 3000);
    };

    function getUserToken() {
      return (
        localStorage.getItem("userToken") ||
        localStorage.getItem("authToken") ||
        localStorage.getItem("token") ||
        localStorage.getItem("customerToken") ||
        ""
      );
    }

    function getHeaders(extra = {}) {
      const token = getUserToken();
      return {
        "Content-Type": "application/json",
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
        ...extra
      };
    }

    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: getHeaders(options.headers || {})
      });

      const text = await res.text();
      let data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch (_) {
        data = text;
      }

      if (!res.ok) {
        throw new Error(
          (data && (data.message || data.error)) ||
          `Erro HTTP ${res.status}`
        );
      }

      return data;
    }

    function formatDate(value) {
      if (!value) return "---";
      try {
        return new Date(value).toLocaleString("pt-BR");
      } catch (_) {
        return "---";
      }
    }

    function statusClass(status) {
      const s = String(status || "").toLowerCase();
      if (s.includes("concl")) return "bg-emerald-500";
      if (s.includes("aná") || s.includes("anal")) return "bg-amber-500";
      if (s.includes("fech") || s.includes("encerr")) return "bg-red-500";
      return "bg-primary-blue";
    }

    function normalizeTicket(payload) {
      const t = payload?.ticket || payload?.data || payload || {};
      return {
        id: t._id || t.id || "",
        title: t.subject || t.assunto || "Chamado",
        subtitle: t.category || t.categoria || "",
        status: t.status || "Aberto",
        orderId: t.orderId || t.pedido || "---",
        createdAt: t.createdAt || t.data || t.created_at || "",
        messages: Array.isArray(t.messages) ? t.messages : [],
      };
    }

    function normalizeMessages(messages) {
      return (messages || []).map((m) => {
        const whoRaw = (m.who || m.authorType || m.senderType || m.sender || "").toLowerCase();
        const isClient = whoRaw.includes("cliente") || whoRaw.includes("user") || whoRaw.includes("buyer");
        return {
          who: isClient ? "cliente" : "suporte",
          text: m.text || m.message || m.body || "",
          at: m.at || m.createdAt || m.date || new Date().toISOString(),
          attach: m.attach || m.image || m.attachment || ""
        };
      });
    }

    function renderChat(messages) {
      const chat = $("chat");
      const normalized = normalizeMessages(messages);

      if (!normalized.length) {
        chat.innerHTML = `
          <div class="text-center text-gray-400 py-10 font-bold">
            Nenhuma mensagem neste protocolo.
          </div>
        `;
        return;
      }

      chat.innerHTML = normalized.map((m) => {
        const isMe = m.who === "cliente";
        return `
          <div class="max-w-[85%] p-4 shadow-sm rounded-2xl border ${isMe ? 'self-end bg-blue-50 border-blue-100' : 'self-start bg-gray-50 border-gray-200'}">
            <div class="flex justify-between items-center mb-2 gap-4">
              <span class="text-[10px] font-black uppercase ${isMe ? 'text-primary-blue' : 'text-gray-400'}">${isMe ? 'Você' : 'Suporte Ariana'}</span>
              <span class="text-[10px] text-gray-400">${formatDate(m.at)}</span>
            </div>
            <div class="font-bold text-sm leading-relaxed text-dark-bg">${m.text || ''}</div>
            ${m.attach ? `<img src="${m.attach}" class="mt-3 rounded-lg border border-gray-200 max-h-60 object-contain">` : ``}
          </div>
        `;
      }).join("");

      chat.scrollTop = chat.scrollHeight;
    }

    function renderTicket(ticket) {
      currentTicket = ticket;

      $("title").textContent = ticket.title || "Chamado";
      $("subtitle").textContent = ticket.subtitle || "";
      $("statusPill").textContent = ticket.status || "Aberto";
      $("statusPill").className = `px-4 py-1 rounded-full text-[10px] font-black uppercase text-white ${statusClass(ticket.status)}`;

      $("tId").textContent = ticket.id ? `#${String(ticket.id).slice(0, 8).toUpperCase()}` : "#---";
      $("tOrder").textContent = ticket.orderId || "---";
      $("tCreated").textContent = formatDate(ticket.createdAt);

      renderChat(ticket.messages);
    }

    async function loadTicket() {
      if (!ticketId) {
        $("title").textContent = "Chamado não encontrado";
        $("subtitle").textContent = "ID não informado";
        showToast("ID do chamado não informado.");
        return;
      }

      try {
        const payload = await apiFetch(`/tickets/${ticketId}`);
        renderTicket(normalizeTicket(payload));
      } catch (e) {
        console.error(e);
        $("title").textContent = "Erro ao carregar";
        $("subtitle").textContent = e.message || "Não foi possível abrir o chamado";
        showToast("Erro ao carregar chamado.");
      }
    }

    async function sendReply(text, attachmentBase64 = "") {
      return await apiFetch(`/tickets/${ticketId}/reply`, {
        method: "POST",
        body: JSON.stringify({
          message: text,
          text,
          attach: attachmentBase64,
          attachment: attachmentBase64
        })
      });
    }

    async function closeTicket() {
      if (!ticketId) return;
      if (!confirm("Deseja encerrar este chamado?")) return;

      try {
        await apiFetch(`/tickets/${ticketId}`, {
          method: "PUT",
          body: JSON.stringify({ status: "Encerrado" })
        });
        showToast("Chamado encerrado com sucesso.");
        await loadTicket();
      } catch (e) {
        console.error(e);
        showToast("Erro ao encerrar chamado.");
      }
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result || "");
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    $("btnAnexo").addEventListener("click", () => $("attach").click());
    $("btnClose").addEventListener("click", closeTicket);

    $("replyForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const reply = $("reply").value.trim();
      const file = $("attach").files?.[0];

      if (!reply && !file) {
        showToast("Digite uma mensagem ou anexe uma foto.");
        return;
      }

      const submitBtn = $("replyForm").querySelector('button[type="submit"]');
      const oldText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = "Enviando...";

      try {
        let attachmentBase64 = "";
        if (file) attachmentBase64 = await fileToBase64(file);

        await sendReply(reply, attachmentBase64);

        $("reply").value = "";
        $("attach").value = "";
        showToast("Resposta enviada.");
        await loadTicket();
      } catch (e) {
        console.error(e);
        showToast("Erro ao enviar resposta.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerHTML = oldText;
      }
    });

    window.addEventListener("DOMContentLoaded", loadTicket);
  </script>

  <script src="marketplace-core.js"></script>
    <script src="marketplace-core_global_payments.js"></script>

     <script src="js/layout-fit.js" defer></script>

    <script src="js/header_auth_fix.js" defer></script>

</body>
</html>
