<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Onboarding de Parceiro | ARIANA MÓVEIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/tailwind.min.css">
  <style>
    :root {
      --primary:#2E6DA4; --dark:#0f172a; --bg:#F5F7FA; --success:#16a34a; --danger:#dc2626; --warning:#ea580c;
    }
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); }
    .bg-primary-blue{background:var(--primary)} .text-primary-blue{color:var(--primary)} .bg-dark-bg{background:var(--dark)}
    .text-dark-bg{color:var(--dark)} .bg-fundo-claro{background:var(--bg)} .bg-success-green{background:var(--success)}
    .bg-error-red{background:var(--danger)} .border-soft{border-color:#e5e7eb} .card{background:#fff;border:1px solid #e5e7eb;border-radius:1.25rem;box-shadow:0 8px 24px rgba(15,23,42,.06)}
    .input{width:100%;border:1px solid #d1d5db;border-radius:1rem;padding:.85rem 1rem;outline:none;background:#fff}
    .input:focus{box-shadow:0 0 0 4px rgba(46,109,164,.12);border-color:var(--primary)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:1rem;padding:.85rem 1.2rem;font-weight:800;transition:.2s}
    .btn-primary{background:var(--primary);color:#fff} .btn-primary:hover{opacity:.95} .btn-dark{background:var(--dark);color:#fff}
    .btn-light{background:#fff;color:var(--dark);border:1px solid #e5e7eb} .pill{display:inline-flex;align-items:center;padding:.35rem .75rem;border-radius:9999px;font-size:.75rem;font-weight:800}
    .toast{box-shadow:0 10px 30px rgba(0,0,0,.12)}
    #toast-container{position:fixed;right:1rem;top:1rem;z-index:80;display:flex;flex-direction:column;gap:.75rem}
    .sidebar-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:.9rem;color:#fff;opacity:.95}
    .sidebar-link:hover,.sidebar-link.active{background:rgba(255,255,255,.08)}
    .stat{padding:1.25rem;border-radius:1.25rem;background:#fff;border:1px solid #e5e7eb;box-shadow:0 8px 24px rgba(15,23,42,.05)}
    .muted{color:#64748b} .table-wrap{overflow:auto} table{width:100%;border-collapse:collapse} th,td{padding:1rem;border-bottom:1px solid #eef2f7;vertical-align:top} th{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:#64748b;text-align:left}
    .page-main{flex:1;overflow:auto;padding:1.5rem} @media (max-width:767px){ .page-main{padding:1rem} }
  </style>
</head>

<body class="min-h-screen p-6">
<div id="toast-container"></div>
<div class="max-w-4xl mx-auto my-10 card p-8">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-black text-dark-bg">Onboarding de Parceiro</h1>
    <p class="muted mt-2">Complete as informações comerciais para enviar sua conta para análise.</p>
  </div>
  <form id="onboarding-form" class="space-y-8">
    <div class="grid md:grid-cols-2 gap-5">
      <div><label class="block text-xs font-black mb-2">Nome Fantasia</label><input id="name" class="input" required></div>
      <div><label class="block text-xs font-black mb-2">CNPJ</label><input id="cnpj" class="input" required></div>
      <div><label class="block text-xs font-black mb-2">Tipo de negócio</label><select id="seller-type" class="input"><option value="fabricante">Fabricante</option><option value="comerciante">Distribuidor / Lojista</option></select></div>
      <div><label class="block text-xs font-black mb-2">CEP de coleta</label><input id="cepOrigem" class="input" maxlength="9" placeholder="00000-000"></div>
      <div><label class="block text-xs font-black mb-2">Banco</label><input id="bank" class="input" required></div>
      <div class="grid grid-cols-2 gap-4"><div><label class="block text-xs font-black mb-2">Agência</label><input id="agency" class="input"></div><div><label class="block text-xs font-black mb-2">Conta</label><input id="account" class="input"></div></div>
      <div class="md:col-span-2"><label class="block text-xs font-black mb-2">Chave PIX</label><input id="pixKey" class="input"></div>
    </div>
    <button id="btn-submit" class="btn btn-dark w-full" type="submit">Finalizar e enviar para análise</button>
  </form>
</div>

<script>
  const API_BASE = window.API_BASE || window.API_URL || localStorage.getItem('apiBaseUrl') || 'http://localhost:3000/api';
  const $ = (id) => document.getElementById(id);

  function toast(message, type='info') {
    const c = $('toast-container');
    if (!c) return alert(message);
    const el = document.createElement('div');
    const color = type === 'success' ? 'bg-success-green' : type === 'error' ? 'bg-error-red' : 'bg-primary-blue';
    el.className = `toast ${color} text-white px-4 py-3 rounded-2xl`;
    el.textContent = message;
    c.appendChild(el);
    setTimeout(() => {
      el.style.opacity = '0';
      setTimeout(() => el.remove(), 300);
    }, 3400);
  }

  function getSellerToken() {
    return localStorage.getItem('seller_token') || '';
  }

  function getStoredPartnerRequestId() {
    return localStorage.getItem('partner_request_id') || '';
  }

  function setStoredPartnerRequestId(id) {
    if (id) localStorage.setItem('partner_request_id', id);
  }

  async function apiFetch(path, options = {}) {
    const token = getSellerToken();
    const response = await fetch(`${API_BASE}${path}`, {
      ...options,
      headers: {
        'Content-Type': 'application/json',
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
        ...(options.headers || {})
      }
    });

    const text = await response.text();
    let data = null;

    try {
      data = text ? JSON.parse(text) : null;
    } catch {
      data = text;
    }

    if (!response.ok) {
      throw new Error(data?.message || data?.error || `Erro HTTP ${response.status}`);
    }

    return data;
  }

  function normalizeDigits(value) {
    return String(value || '').replace(/\D/g, '');
  }

  function formatCepInput(value) {
    const v = normalizeDigits(value).slice(0, 8);
    return v.length > 5 ? `${v.slice(0, 5)}-${v.slice(5)}` : v;
  }

  function resolveRequestId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('rid') || getStoredPartnerRequestId() || '';
  }

  function fillForm(data = {}) {
    const bank = data.bankAccount || data.bank || {};

    $('name').value = data.factoryName || data.name || data.nomeFantasia || '';
    $('cnpj').value = data.cnpj || data.cpf_cnpj || data.document || '';
    if (data.type) $('seller-type').value = data.type;
    $('cepOrigem').value = formatCepInput(bank.cepOrigem || bank.zipOrigin || bank.cep || '');
    $('bank').value = bank.bank || bank.banco || '';
    $('agency').value = bank.agency || bank.agencia || '';
    $('account').value = bank.account || bank.conta || '';
    $('pixKey').value = bank.pixKey || bank.pix || bank.chavePix || '';
  }

  async function loadOnboardingData() {
    const rid = resolveRequestId();
    if (!rid) return;

    try {
      const data = await apiFetch(`/seller/partner-requests/${encodeURIComponent(rid)}`);
      const request = data?.request || data?.partnerRequest || data?.data || data || {};
      fillForm(request);
      setStoredPartnerRequestId(rid);
    } catch (e) {
      console.error(e);
    }
  }

  $('cepOrigem').addEventListener('input', (e) => {
    e.target.value = formatCepInput(e.target.value);
  });

  $('onboarding-form').addEventListener('submit', async (e) => {
    e.preventDefault();

    const rid = resolveRequestId();
    if (!rid) {
      toast('ID da solicitação ausente.', 'error');
      return;
    }

    const btn = $('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    try {
      const payload = {
        factoryName: $('name').value.trim(),
        cnpj: $('cnpj').value.trim(),
        type: $('seller-type').value,
        bankAccount: {
          bank: $('bank').value.trim(),
          agency: $('agency').value.trim(),
          account: $('account').value.trim(),
          pixKey: $('pixKey').value.trim(),
          cepOrigem: normalizeDigits($('cepOrigem').value)
        },
        onboardingCompleted: true,
        status: 'pending_analysis'
      };

      await apiFetch(`/seller/partner-requests/${encodeURIComponent(rid)}/onboarding`, {
        method: 'PUT',
        body: JSON.stringify(payload)
      });

      setStoredPartnerRequestId(rid);
      toast('Dados enviados para análise.', 'success');

      setTimeout(() => {
        window.location.href = `seller_pending.html?rid=${encodeURIComponent(rid)}`;
      }, 700);
    } catch (e) {
      console.error(e);
      toast(e.message || 'Erro ao salvar dados.', 'error');
      btn.disabled = false;
      btn.textContent = 'Finalizar e enviar para análise';
    }
  });

  loadOnboardingData();
</script>
<script src="js/layout-fit.js" defer></script>
</body></html>
