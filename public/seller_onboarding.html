<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar Senha | ARIANA MÓVEIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --primary:#2E6DA4; --dark:#0f172a; --bg:#F5F7FA; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg); }
    .btn-primary { background-color: var(--primary); color: white; transition: 0.2s; }
    .btn-primary:hover { opacity: 0.9; }
    #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 100; display: flex; flex-direction: column; gap: 0.5rem; }
    .animate-bounce-short { animation: bounce 0.5s ease-in-out; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

  <div id="toast-container"></div>

  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-black text-slate-900 tracking-tight">Recuperar Senha</h1>
      <p class="text-slate-500 mt-2 text-sm font-medium">Digite seu e-mail para receber as instruções de acesso ao painel seller.</p>
    </div>

    <form id="recovery-form" class="space-y-5">
      <div>
        <label class="block text-xs font-bold uppercase tracking-wider text-slate-700 mb-2">E-mail Cadastrado</label>
        <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:border-[#2E6DA4] transition-all font-medium" placeholder="seu@email.com" required autocomplete="email">
      </div>

      <button type="submit" id="btn-submit" class="w-full py-4 rounded-xl font-bold btn-primary shadow-lg shadow-blue-900/20 flex items-center justify-center gap-2">
        <i class="fas fa-paper-plane"></i> Enviar Instruções
      </button>

      <div class="text-center mt-6">
        <a href="seller_login.html" class="text-sm font-bold text-[#2E6DA4] hover:underline flex items-center justify-center gap-2">
          <i class="fas fa-arrow-left text-xs"></i> Voltar para o Login
        </a>
      </div>
    </form>
  </div>

  <script>
    // URL UNIFICADA DO RENDER
    const API_BASE = "https://ariana-moveis.onrender.com/api";

    const $ = (id) => document.getElementById(id);

    function toast(message, type = 'info') {
      const container = $('toast-container');
      const el = document.createElement('div');
      const bgColor = type === 'success' ? 'bg-green-600' : 'bg-red-600';
      el.className = `${bgColor} text-white px-6 py-3 rounded-xl shadow-lg font-bold text-sm animate-bounce-short`;
      el.textContent = message;
      container.appendChild(el);
      setTimeout(() => {
        el.style.opacity = '0';
        setTimeout(() => el.remove(), 300);
      }, 4000);
    }

    $('recovery-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = $('btn-submit');
      const email = $('email').value.trim().toLowerCase();

      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Enviando...';

      try {
        const res = await fetch(`${API_BASE}/seller/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.message || 'Erro ao processar e-mail');

        toast('Se o e-mail existir, você receberá um link em breve!', 'success');
        $('recovery-form').reset();
        
      } catch (err) {
        console.error('Erro:', err);
        toast(err.message || 'Erro ao conectar com o servidor Ariana Móveis', 'error');
      } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> Enviar Instruções';
      }
    });
  </script>
</body>
</html>
