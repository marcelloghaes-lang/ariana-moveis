<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Recuperar senha | ARIANA MÓVEIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-blue': '#2E6DA4',
            'dark-bg': '#1D2B3A',
            'fundo-claro': '#F5F7FA',
            'success-green': '#16a34a',
            'error-red': '#dc2626',
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --primary:#2E6DA4; --dark:#1D2B3A; --bg:#F5F7FA; --success:#16a34a; --danger:#dc2626;
    }
    body { font-family: Inter, sans-serif; background: var(--bg); }
    .bg-primary-blue{background:var(--primary)} .text-primary-blue{color:var(--primary)}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:1.25rem;box-shadow:0 8px 24px rgba(15,23,42,.06)}
    .input{width:100%;border:1px solid #d1d5db;border-radius:1rem;padding:.85rem 1rem;outline:none;background:#fff}
    .input:focus{box-shadow:0 0 0 4px rgba(46,109,164,.12);border-color:var(--primary)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:1rem;padding:.85rem 1.2rem;font-weight:800;transition:.2s}
    .btn-primary{background:var(--primary);color:#fff} .btn-primary:hover{opacity:.95}
    #toast-container{position:fixed;right:1rem;top:1rem;z-index:80;display:flex;flex-direction:column;gap:.75rem}
    .toast{box-shadow:0 10px 30px rgba(0,0,0,.12); transition: opacity 0.3s ease-out;}
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">
<div id="toast-container"></div>

<section class="card p-8 w-full max-w-lg animate-fade">
  <div class="text-center mb-6">
    <h1 class="text-3xl font-black text-primary-blue tracking-tighter">ARIANA MÓVEIS</h1>
  </div>

  <h2 class="text-2xl font-black text-slate-900 mb-2">Recuperar senha (Seller)</h2>
  <p class="text-slate-600 mb-6">Informe seu e-mail de seller para receber as instruções de redefinição.</p>

  <form id="reset-form" class="space-y-4">
    <div>
      <label class="block text-sm font-bold mb-2 text-slate-700">Seu e-mail cadastrado</label>
      <input id="email" type="email" required class="input" placeholder="exemplo@loja.com" autocomplete="email">
    </div>

    <button id="btn-reset" class="btn btn-primary w-full shadow-lg" type="submit">
      <i class="fas fa-paper-plane mr-2"></i> Enviar link de acesso
    </button>

    <div class="text-sm flex justify-between pt-4 border-t border-gray-100">
      <a href="seller_login.html" class="text-primary-blue font-bold hover:underline">Voltar ao login</a>
      <a href="seller_cadastro.html" class="text-primary-blue font-bold hover:underline">Criar solicitação</a>
    </div>
  </form>
</section>

<script>
const API_BASE = "https://ariana-move-mongo.onrender.com/api"; // URL do seu Render atualizada
const $ = (id)=>document.getElementById(id);

function toast(message, type='info'){
  const c = $('toast-container');
  if(!c) return alert(message);

  const el = document.createElement('div');
  const color = type==='success' ? 'bg-success-green' : type==='error' ? 'bg-error-red' : 'bg-primary-blue';

  el.className = `toast ${color} text-white px-4 py-3 rounded-2xl font-bold`;
  el.textContent = message;
  c.appendChild(el);

  setTimeout(()=>{
    el.style.opacity='0';
    setTimeout(()=>el.remove(),300);
  },3500);
}

$('reset-form').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const btn = $('btn-reset');
  const email = $('email').value.trim().toLowerCase();

  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Processando...';

  try {
    const response = await fetch(`${API_BASE}/seller/auth/recover-password`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });

    const data = await response.json();

    if (response.ok) {
      toast("Se o e-mail existir no sistema, você receberá um link em breve.", "success");
      $('reset-form').reset();
    } else {
      toast(data.message || "Erro ao processar solicitação.", "error");
    }
  } catch (err) {
    console.error(err);
    toast("Servidor indisponível no momento.", "error");
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i> Enviar link de acesso';
  }
});
</script>
</body>
</html>
