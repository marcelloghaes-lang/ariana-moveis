<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Recuperar senha | ARIANA MÓVEIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/tailwind.min.css">

  <style>
    :root {
      --primary:#2E6DA4; --dark:#0f172a; --bg:#F5F7FA; --success:#16a34a; --danger:#dc2626; --warning:#ea580c;
    }
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); }
    .bg-primary-blue{background:var(--primary)} .text-primary-blue{color:var(--primary)} .bg-dark-bg{background:var(--dark)}
    .text-dark-bg{color:var(--dark)} .bg-fundo-claro{background:var(--bg)} .bg-success-green{background:var(--success)}
    .bg-error-red{background:var(--danger)} .border-soft{border-color:#e5e7eb} .card{background:#fff;border:1px solid #e5e7eb;border-radius:1.25rem;box-shadow:0 8px 24px rgba(15,23,42,.06)}
    .input{width:100%;border:1px solid #d1d5db;border-radius:1rem;padding:.85rem 1rem;outline:none;background:#fff}
    .input:focus{box-shadow:0 0 0 4px rgba(46,109,164,.12);border-color:var(--primary)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:1rem;padding:.85rem 1.2rem;font-weight:800;transition:.2s}
    .btn-primary{background:var(--primary);color:#fff} .btn-primary:hover{opacity:.95} .btn-dark{background:var(--dark);color:#fff}
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div id="toast-container"></div>

<section class="card p-8 w-full max-w-lg">

  <h2 class="text-2xl font-black text-slate-900 mb-2">Recuperar senha (Seller)</h2>
  <p class="text-slate-600 mb-6">Informe seu e-mail de seller para receber o link de redefinição.</p>

  <form id="reset-form" class="space-y-4">
    <div>
      <label class="block text-sm font-bold mb-2">E-mail</label>
      <input id="email" type="email" required class="input">
    </div>

    <button id="btn-reset" class="btn btn-primary w-full" type="submit">
      Enviar link de acesso
    </button>

    <div class="text-sm flex justify-between">
      <a href="seller_login.html" class="text-primary-blue font-bold">Voltar ao login</a>
      <a href="seller_cadastro.html" class="text-primary-blue font-bold">Criar solicitação</a>
    </div>
  </form>

</section>

<script>
const API_BASE = window.API_BASE || "http://localhost:3000/api";
const $ = (id)=>document.getElementById(id);

function toast(message, type='info'){
  const c = $('toast-container');
  if(!c) return alert(message);

  const el = document.createElement('div');
  const color = type==='success' ? 'bg-success-green' : type==='error' ? 'bg-error-red' : 'bg-primary-blue';

  el.className = `toast ${color} text-white px-4 py-3 rounded-2xl`;
  el.textContent = message;
  c.appendChild(el);

  setTimeout(()=>{
    el.style.opacity='0';
    setTimeout(()=>el.remove(),300);
  },3000);
}

$('reset-form').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const btn = $('btn-reset');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  try{
    const email = $('email').value.trim();

    await fetch(API_BASE + "/auth/recuperar-senha",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ email })
    });

    toast("Link de recuperação enviado com sucesso.", "success");

  }catch(e){
    console.error(e);
    toast("Erro ao enviar link.", "error");
  }

  btn.disabled = false;
  btn.textContent = 'Enviar link de acesso';
});
</script>

<script src="js/layout-fit.js" defer></script>

</body>
</html>
