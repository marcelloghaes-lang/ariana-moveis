<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://*.gstatic.com https://*.googleapis.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.tailwindcss.com; script-src 'self' 'unsafe-inline' https://*.gstatic.com https://*.googleapis.com https://cdn.tailwindcss.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com;">
  <title>Central Admin | ARIANA MÓVEIS</title>

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" href="icon-admin-192.png">
  
  <link rel="stylesheet" href="css/tailwind.min.css">
  <link rel="stylesheet" href="css/all.min.css">
  <style>
    .card-btn { transition: all 0.3s ease; cursor: pointer; }
    .card-btn:hover { 
      transform: translateY(-10px); 
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
    }
    #install-banner { display: none; }
  </style>
</head>

<body class="bg-slate-100 min-h-screen flex flex-col items-center justify-center p-6">

  <div id="install-banner" class="fixed top-4 inset-x-4 z-50 bg-blue-700 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between">
    <div class="flex items-center gap-3">
      <i class="fas fa-mobile-alt text-2xl"></i>
      <div>
        <p class="font-black text-sm uppercase">Ariana Admin no Celular</p>
        <p class="text-xs opacity-80 font-bold">Instale para acesso rápido</p>
      </div>
    </div>
    <button id="btn-install" class="bg-white text-blue-700 px-4 py-2 rounded-xl font-black text-xs">INSTALAR</button>
  </div>

  <div class="max-w-5xl w-full">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-black text-slate-900 tracking-tighter uppercase">Central de Controle</h1>
      <p class="text-slate-500 font-bold mt-2">Toque em um painel para acessar</p>
    </div>

    <div class="grid md:grid-cols-3 gap-8">
      <a href="admin_login.html" class="card-btn bg-white rounded-3xl p-6 border border-slate-200 text-center">
        <img src="ariana-config.jpg" alt="Login" class="w-full h-48 object-contain mb-4 rounded-2xl">
        <h2 class="text-xl font-black text-slate-800 uppercase">Acesso & Login</h2>
      </a>

      <a href="admin_painel.html" class="card-btn bg-white rounded-3xl p-6 border-2 border-blue-600 text-center">
        <img src="ariana-admin.jpg" alt="Painel Admin" class="w-full h-48 object-contain mb-4 rounded-2xl">
        <h2 class="text-xl font-black text-slate-800 uppercase">Painel Principal</h2>
      </a>

      <a href="banner_admin.html" class="card-btn bg-white rounded-3xl p-6 border border-slate-200 text-center">
        <img src="banner-ariana.jpg" alt="Banners" class="w-full h-48 object-contain mb-4 rounded-2xl">
        <h2 class="text-xl font-black text-slate-800 uppercase">Gestor de Banners</h2>
      </a>
    </div>

    <div class="mt-12 text-center">
      <a href="/" class="text-slate-400 hover:text-slate-600 font-bold flex items-center justify-center gap-2">
        <i class="fas fa-arrow-left"></i> Voltar para a Loja
      </a>
    </div>
  </div>

  <script>
    let deferredPrompt;
    const banner = document.getElementById('install-banner');
    const btnInstall = document.getElementById('btn-install');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      banner.style.display = 'flex';
    });

    btnInstall.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') banner.style.display = 'none';
        deferredPrompt = null;
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js');
      });
    }
  </script>
</body>
</html>
