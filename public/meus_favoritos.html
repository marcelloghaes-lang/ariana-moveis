<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Início | ARIANA MÓVEIS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="css/tailwind.min.css">
</head>

<body class="bg-fundo-claro font-sans text-text-dark">

<div class="bg-primary-blue text-white text-center py-2 text-sm font-semibold">
⭐ GARANTIA DE QUALIDADE E SATISFAÇÃO
</div>

<div id="header-container"></div>

<main class="max-w-7xl mx-auto px-4 py-10 min-h-[60vh]">
<div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
<div>
<h1 class="text-3xl font-black text-gray-900 tracking-tight">Meus Favoritos</h1>
<p id="fav-count" class="text-primary-blue font-bold">0 itens salvos</p>
</div>

<a href="index.html" class="flex items-center justify-center gap-2 bg-white border-2 border-primary-blue text-primary-blue px-6 py-2.5 rounded-xl font-bold hover:bg-primary-blue hover:text-white transition-all duration-300 shadow-sm">
Voltar para a Loja
</a>
</div>

<div id="empty-state" class="hidden flex flex-col items-center justify-center py-20 bg-white rounded-3xl border-2 border-dashed border-gray-200">
<h2 class="text-2xl font-bold text-gray-800 mb-2">Sua lista está vazia</h2>
<p class="text-gray-500 mb-8">Nenhum produto foi favoritado ainda.</p>
<a href="index.html" class="bg-primary-blue text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg shadow-blue-200">
Ver ofertas hoje
</a>
</div>

<div id="favorites-list" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
</main>

<div id="footer-container"></div>

<script>
const API = "http://localhost:3000/api";

const favoritesListEl = document.getElementById('favorites-list');
const emptyStateEl = document.getElementById('empty-state');
const favCountEl = document.getElementById('fav-count');

const formatBRL = (val) =>
new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);

// ========================
// GET FAVORITOS LOCAL
// ========================
function getFavorites(){
return JSON.parse(localStorage.getItem("favorites") || "[]");
}

// ========================
// SALVAR FAVORITOS
// ========================
function saveFavorites(list){
localStorage.setItem("favorites", JSON.stringify(list));
}

// ========================
// REMOVER
// ========================
window.removeFavorite = function(id){
let favs = getFavorites();
favs = favs.filter(f => f !== id);
saveFavorites(favs);
loadFavorites();
};

// ========================
// RENDER
// ========================
function renderFavorites(products){

favoritesListEl.innerHTML = "";
favCountEl.textContent = `${products.length} itens salvos`;

if(!products.length){
emptyStateEl.classList.remove("hidden");
return;
}

emptyStateEl.classList.add("hidden");

products.forEach(product => {

favoritesListEl.innerHTML += `
<div class="bg-white rounded-2xl shadow-sm border overflow-hidden flex flex-col">

<div class="h-56 p-4">
<img src="${product.imageUrl}" class="w-full h-full object-contain">
</div>

<div class="p-5 text-center flex flex-col flex-grow">
<h3 class="font-bold mb-2 text-sm">${product.name}</h3>
<p class="text-xl font-black text-primary-blue mb-5">${formatBRL(product.price)}</p>

<div class="mt-auto space-y-2">
<a href="produto.html?id=${product._id}" class="block bg-primary-blue text-white py-2 rounded-xl font-bold text-sm">
Ver Detalhes
</a>

<button onclick="removeFavorite('${product._id}')" class="text-red-500 text-xs">
Remover
</button>
</div>

</div>
</div>
`;
});
}

// ========================
// LOAD
// ========================
async function loadFavorites(){

const ids = getFavorites();

if(!ids.length){
renderFavorites([]);
return;
}

try{
const res = await fetch(`${API}/products`);
const all = await res.json();

const filtered = all.filter(p => ids.includes(p._id));

renderFavorites(filtered);

}catch(e){
console.error(e);
}
}

document.addEventListener("DOMContentLoaded", loadFavorites);
</script>

<script src="./header.js"></script>
<script src="footer.js"></script>

</body>
</html>
