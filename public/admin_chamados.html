<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Início | ARIANA MÓVEIS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="stylesheet" href="css/tailwind.min.css">

  <style>
    .bg-dark-bg { background-color: #1D2B3A; }
    .text-primary-blue { color: #2E6DA4; }
    .status-novo { background-color: #fee2e2; color: #991b1b; }
    .status-respondido { background-color: #dcfce7; color: #166534; }

    .bg-primary-blue { background-color: #2E6DA4; }
    .bg-dark-gray-bg { background-color: #222222; }
    .bg-error-red { background-color: #ef4444; }
    .bg-success-green { background-color: #10b981; }

    .toast {
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, .1), 0 2px 4px -2px rgba(0, 0, 0, .1);
      transition: opacity .25s ease-out;
    }

    .animate-fade {
      animation: fade-in .25s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body class="bg-gray-100">
  <div class="flex min-h-screen">
    <!-- Sidebar -->
    <aside class="w-64 bg-dark-bg text-white hidden md:block">
      <div class="p-6 text-xl font-bold border-b border-gray-700 text-primary-blue">ADMIN ARIANA</div>
      <nav class="p-4 space-y-2">
        <a href="admin_painel.html" class="block p-3 hover:bg-dark-gray-bg rounded-lg">
          <i class="fas fa-home mr-2"></i>Dashboard
        </a>
        <a href="admin_chamados.html" class="block p-3 bg-primary-blue rounded-lg text-white">
          <i class="fas fa-headset mr-2"></i>Chamados
        </a>
      </nav>
    </aside>

    <!-- Conteúdo -->
    <main class="flex-1 p-8">
      <header class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold text-gray-800">Gerenciar Chamados</h1>
        <div class="flex gap-3">
          <span id="count-abertos" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-bold">0 Abertos</span>
        </div>
      </header>

      <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
        <table class="w-full text-left">
          <thead class="bg-gray-50 border-b">
            <tr>
              <th class="p-4 font-semibold text-gray-600">Cliente</th>
              <th class="p-4 font-semibold text-gray-600">Assunto</th>
              <th class="p-4 font-semibold text-gray-600">Status</th>
              <th class="p-4 font-semibold text-gray-600">Data</th>
              <th class="p-4 text-right font-semibold text-gray-600">Ação</th>
            </tr>
          </thead>
          <tbody id="lista-chamados" class="divide-y divide-gray-100 text-sm"></tbody>
        </table>
      </div>

      <div id="toast-container" class="fixed top-5 right-5 space-y-3 z-50"></div>
    </main>
  </div>

  <script src="js/header_auth_fix.js"></script>

  <script>
    const API_BASE =
      localStorage.getItem("API_BASE") ||
      "https://ariana-move-mongo.onrender.com/api";

    const listaChamadosEl = document.getElementById("lista-chamados");
    const countAbertosEl = document.getElementById("count-abertos");
    const toastContainerEl = document.getElementById("toast-container");

    function getAdminToken() {
      return (
        localStorage.getItem("adminToken") ||
        localStorage.getItem("admin_token") ||
        localStorage.getItem("token") ||
        localStorage.getItem("authToken") ||
        ""
      );
    }

    function getDefaultHeaders(extra = {}) {
      const token = getAdminToken();
      return {
        "Content-Type": "application/json",
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
        ...extra
      };
    }

    async function apiFetch(path, options = {}) {
      const response = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: getDefaultHeaders(options.headers || {})
      });

      const text = await response.text();
      let data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch {
        data = text;
      }

      if (!response.ok) {
        throw new Error(
          (data && (data.message || data.error)) ||
          `Erro HTTP ${response.status}`
        );
      }

      return data;
    }

    function toast(message, type = "info") {
      if (!toastContainerEl) {
        alert(message);
        return;
      }

      const el = document.createElement("div");
      const map = {
        success: "bg-success-green",
        error: "bg-error-red",
        info: "bg-primary-blue"
      };

      el.className = `toast p-4 rounded-lg text-white shadow-lg ${map[type] || map.info} animate-fade`;
      el.textContent = message;
      toastContainerEl.appendChild(el);

      setTimeout(() => {
        el.style.opacity = "0";
        setTimeout(() => el.remove(), 250);
      }, 3500);
    }

    function showErrorRow(msg) {
      listaChamadosEl.innerHTML = `
        <tr>
          <td class="p-4 text-red-600 font-bold" colspan="5">${msg}</td>
        </tr>
      `;
    }

    function formatDate(value) {
      if (!value) return "---";
      try {
        return new Date(value).toLocaleDateString("pt-BR");
      } catch {
        return "---";
      }
    }

    function normalizeTicketsResponse(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload?.tickets)) return payload.tickets;
      if (Array.isArray(payload?.items)) return payload.items;
      if (Array.isArray(payload?.data)) return payload.data;
      return [];
    }

    async function checkAdmin() {
      try {
        const me = await apiFetch("/admin/me");
        return !!(me && (me.admin || me.user || me.data || me));
      } catch (e) {
        return false;
      }
    }

    async function carregarChamados() {
      try {
        listaChamadosEl.innerHTML = `
          <tr>
            <td class="p-4 text-gray-500" colspan="5">Carregando chamados...</td>
          </tr>
        `;

        const payload = await apiFetch("/tickets?sort=createdAt_desc");
        const tickets = normalizeTicketsResponse(payload);

        let abertos = 0;
        listaChamadosEl.innerHTML = "";

        if (!tickets.length) {
          listaChamadosEl.innerHTML = `
            <tr>
              <td class="p-4 text-gray-500" colspan="5">Nenhum chamado encontrado.</td>
            </tr>
          `;
          countAbertosEl.innerText = "0 Abertos";
          return;
        }

        tickets.forEach((ticket) => {
          const status = ticket.status || "Aberto";
          if (status === "Aberto") abertos++;

          const dataFormat = formatDate(
            ticket.createdAt ||
            ticket.data ||
            ticket.created_at
          );

          listaChamadosEl.insertAdjacentHTML("beforeend", `
            <tr class="hover:bg-blue-50 transition">
              <td class="p-4 font-bold text-gray-700">${ticket.customerName || ticket.nome || "Cliente"}</td>
              <td class="p-4">
                <span class="block font-medium">${ticket.subject || ticket.assunto || "—"}</span>
                <span class="text-xs text-gray-500 italic">Pedido: ${ticket.orderId || ticket.pedido || "N/A"}</span>
              </td>
              <td class="p-4">
                <select onchange="updateStatus('${ticket._id || ticket.id}', this.value)" class="bg-gray-50 border rounded p-1 text-xs font-bold">
                  <option value="Aberto" ${status === "Aberto" ? "selected" : ""}>ABERTO</option>
                  <option value="Em Análise" ${status === "Em Análise" ? "selected" : ""}>EM ANÁLISE</option>
                  <option value="Concluído" ${status === "Concluído" ? "selected" : ""}>CONCLUÍDO</option>
                </select>
              </td>
              <td class="p-4 text-gray-500">${dataFormat}</td>
              <td class="p-4 text-right">
                <button onclick="responder('${ticket._id || ticket.id}')" class="bg-primary-blue text-white px-3 py-1 rounded hover:bg-blue-700">
                  Responder
                </button>
              </td>
            </tr>
          `);
        });

        countAbertosEl.innerText = `${abertos} Abertos`;
      } catch (err) {
        console.error("[tickets] load error:", err);
        showErrorRow(err.message || "Erro ao carregar chamados.");
      }
    }

    async function updateStatus(id, novoStatus) {
      try {
        await apiFetch(`/tickets/${id}`, {
          method: "PUT",
          body: JSON.stringify({ status: novoStatus })
        });
        toast("Status atualizado!", "success");
      } catch (e) {
        console.error(e);
        toast(e.message || "Erro ao atualizar status.", "error");
      }
    }
    window.updateStatus = updateStatus;

    async function responder(id) {
      const resposta = prompt("Digite sua resposta para o cliente:");
      if (!resposta) return;

      try {
        await apiFetch(`/tickets/${id}/reply`, {
          method: "POST",
          body: JSON.stringify({
            adminReply: resposta,
            status: "Em Análise"
          })
        });
        toast("Resposta enviada!", "success");
        await carregarChamados();
      } catch (e) {
        console.error(e);
        toast(e.message || "Erro ao enviar resposta.", "error");
      }
    }
    window.responder = responder;

    async function initPage() {
      const ok = await checkAdmin();

      if (!ok) {
        alert("Acesso negado: conta não é ADMIN.");
        window.location.href = "login_admin.html";
        return;
      }

      await carregarChamados();
    }

    initPage();
  </script>

  <script src="marketplace-core.js"></script>
  <script src="marketplace-core_global_payments.js"></script>
  <script src="js/layout-fit.js" defer></script>
  <script src="header.js" defer></script>
  <script src="js/header_auth_fix.js" defer></script>
</body>
</html>
