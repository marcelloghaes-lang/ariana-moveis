<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Conta em análise | ARIANA MÓVEIS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/tailwind.min.css">

  <style>
    :root { --primary:#2E6DA4; --dark:#0f172a; --bg:#F5F7FA; --success:#16a34a; --danger:#dc2626; }
    body { font-family: Inter, system-ui; background: var(--bg); }
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:1.25rem;padding:2rem}
    .btn{border-radius:1rem;padding:.85rem 1.2rem;font-weight:800}
    .btn-primary{background:#2E6DA4;color:#fff}
    .btn-light{background:#fff;border:1px solid #e5e7eb}
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6">

<div id="toast-container"></div>

<div class="w-full max-w-xl card">

  <h1 class="text-2xl font-black text-slate-900">Sua conta está em análise</h1>
  <p class="mt-2 text-slate-600">Quando a aprovação for concluída, seu acesso ao painel será liberado.</p>

  <div class="mt-6 rounded-2xl border border-slate-200 bg-slate-50 p-4">
    <div class="text-xs font-extrabold text-slate-500">STATUS</div>
    <div id="statusText" class="mt-1 text-lg font-black text-slate-900">carregando…</div>
    <div id="hintText" class="mt-1 text-sm text-slate-600"></div>
  </div>

  <div class="mt-6 flex flex-col sm:flex-row gap-3">
    <button id="btnRefresh" class="btn btn-primary">Atualizar status</button>
    <a href="seller_login.html" class="btn btn-light">Ir para login</a>
  </div>

</div>

<script>
const API_BASE =
  window.API_BASE ||
  localStorage.getItem("API_BASE") ||
  "http://localhost:3000/api";

const $ = (id)=>document.getElementById(id);

function getToken(){
  return localStorage.getItem("seller_token") || "";
}

// ===== STATUS VIA REQUEST =====
async function loadByRequestId(rid){
  try{
    const res = await fetch(API_BASE + "/seller/partner-request/" + rid);
    const d = await res.json();

    const st = String(d.status || "").toLowerCase();

    if(st === "approved"){
      $("statusText").textContent = "APROVADO ✅";
      $("hintText").textContent = "Seu acesso será liberado.";
      return;
    }

    if(st === "rejected"){
      $("statusText").textContent = "REPROVADO ❌";
      $("hintText").textContent = "Entre em contato com suporte.";
      return;
    }

    if(st === "pending_onboarding"){
      $("statusText").textContent = "PENDENTE: ONBOARDING";
      $("hintText").textContent = "Finalize o cadastro.";
      return;
    }

    $("statusText").textContent = "EM ANÁLISE ⏳";
    $("hintText").textContent = "Aguardando aprovação.";

  }catch{
    $("statusText").textContent = "Erro ao consultar";
  }
}

// ===== STATUS VIA LOGIN =====
async function loadByAuth(){
  try{
    const res = await fetch(API_BASE + "/seller/me",{
      headers:{ Authorization:`Bearer ${getToken()}` }
    });

    const seller = await res.json();

    const st = String(seller.status || "").toLowerCase();

    if(seller.active && st === "approved"){
      $("statusText").textContent = "APROVADO ✅";
      $("hintText").textContent = "Redirecionando...";
      setTimeout(()=>window.location.href="seller_dashboard.html", 600);
      return;
    }

    if(st === "rejected"){
      $("statusText").textContent = "REPROVADO ❌";
      $("hintText").textContent = "Entre em contato.";
      return;
    }

    $("statusText").textContent = "EM ANÁLISE ⏳";
    $("hintText").textContent = "Aguardando aprovação.";

  }catch{
    $("statusText").textContent = "Erro ao verificar login";
  }
}

// ===== REFRESH =====
async function refreshStatus(){
  const rid =
    new URLSearchParams(window.location.search).get("rid") ||
    localStorage.getItem("partner_request_id");

  if(getToken()){
    return loadByAuth();
  }

  if(rid){
    return loadByRequestId(rid);
  }

  $("statusText").textContent = "Nenhuma solicitação encontrada";
}

// ===== EVENTO =====
$("btnRefresh").addEventListener("click", refreshStatus);

// ===== INIT =====
refreshStatus();
</script>

<script src="js/layout-fit.js" defer></script>

</body>
</html>
