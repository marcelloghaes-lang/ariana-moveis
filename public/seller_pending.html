<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Conta em análise | ARIANA MÓVEIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/tailwind.min.css">
  <style>
    :root { --primary:#2E6DA4; --dark:#0f172a; --bg:#F5F7FA; }
    body { font-family: Inter, sans-serif; background: var(--bg); }
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:1.5rem;box-shadow:0 10px 30px rgba(15,23,42,0.08)}
    .btn-primary{background:var(--primary);color:#fff;font-weight:800;border-radius:1rem;padding:.85rem 1.5rem}
    .btn-light{background:#fff;color:var(--dark);border:1px solid #e5e7eb;font-weight:800;border-radius:1rem;padding:.85rem 1.5rem}
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

  <div class="max-w-md w-full card p-10 text-center">
    <div class="w-20 h-20 bg-blue-50 text-[#2E6DA4] rounded-3xl flex items-center justify-center mx-auto mb-6">
      <i class="fa-solid fa-clock-rotate-left text-3xl animate-pulse"></i>
    </div>
    
    <h1 class="text-2xl font-black text-slate-900 mb-3">Sua conta está em análise</h1>
    <p class="text-slate-500 mb-8 leading-relaxed">
      Quando a aprovação for concluída por nossa equipe, seu acesso ao painel será liberado automaticamente.
    </p>

    <div class="bg-slate-50 border border-slate-100 rounded-2xl p-5 mb-8">
      <span class="block text-[10px] uppercase font-black tracking-widest text-slate-400 mb-1">Status Atual</span>
      <div id="status-badge" class="text-lg font-bold text-slate-800">Verificando...</div>
    </div>

    <div class="flex flex-col gap-3">
      <button onclick="refreshStatus()" id="btn-refresh" class="btn-primary w-full">Atualizar status</button>
      <a href="seller_login.html" class="btn-light w-full">Ir para login</a>
    </div>
  </div>

<script>
  // CONFIGURAÇÃO DIRETA PARA O RENDER (FIM DO LOCALHOST)
  const API_BASE = "https://ariana-moveis.onrender.com/api";
  const $ = (id) => document.getElementById(id);

  // Mapeamento de status que vêm do seu MongoDB Atlas
  const statusMap = {
    'pending_onboarding': 'Onboarding pendente',
    'pending_analysis': 'Em análise técnica',
    'em_analise': 'Em análise técnica',
    'aprovado': 'Conta Aprovada!',
    'reprovado': 'Solicitação Recusada',
    'bloqueado': 'Conta Bloqueada'
  };

  async function refreshStatus() {
    const statusBadge = $('status-badge');
    const btn = $('btn-refresh');
    
    // Pega o ID que salvamos no Login ou Cadastro
    const rid = localStorage.getItem('partner_request_id') || localStorage.getItem('seller_pending_uid');
    
    if (!rid) {
      statusBadge.textContent = "Erro: Login expirado";
      statusBadge.className = "text-lg font-bold text-red-600";
      return;
    }

    btn.disabled = true;
    btn.textContent = "Consultando...";

    try {
      // Pergunta o status real ao servidor no Render
      const response = await fetch(`${API_BASE}/seller/partner-requests/${rid}`);
      if (!response.ok) throw new Error();
      
      const data = await response.json();
      
      // Ajusta para o formato de resposta do seu server.js
      const requestData = data.request || data;
      const status = requestData.status || 'pending_analysis';

      statusBadge.textContent = statusMap[status] || status;
      statusBadge.className = "text-lg font-bold text-[#2E6DA4]";

      // Se você aprovar o vendedor no MongoDB Atlas, ele entra aqui automaticamente
      if (status === 'aprovado' || requestData.active === true) {
        window.location.href = 'seller_dashboard.html';
      }

    } catch (e) {
      console.error("Erro na verificação:", e);
      statusBadge.textContent = "Erro ao verificar login";
      statusBadge.className = "text-lg font-bold text-red-600";
    } finally {
      btn.disabled = false;
      btn.textContent = "Atualizar status";
    }
  }

  // Verifica o status assim que a página abre
  window.onload = refreshStatus;
</script>
</body>
</html>
