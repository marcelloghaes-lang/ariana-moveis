<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Devoluções | ARIANA MÓVEIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'primary-blue': '#2E6DA4',
            'dark-bg': '#1D2B3A',
            'fundo-claro': '#F5F7FA',
            'dark-gray-bg': '#222222',
            'error-red': '#ef4444',
            'success-green': '#10b981',
          }
        }
      }
    }
  </script>
  <style>
    :root { --primary:#2E6DA4; --dark:#1D2B3A; --bg:#F5F7FA; --success:#10b981; --danger:#ef4444; }
    body { font-family: Inter, sans-serif; background: var(--bg); }
    .bg-primary-blue{background:var(--primary)} .text-primary-blue{color:var(--primary)} .bg-dark-bg{background:var(--dark)}
    .text-dark-bg{color:var(--dark)} .bg-fundo-claro{background:var(--bg)} .bg-success-green{background:var(--success)}
    .bg-error-red{background:var(--danger)} .border-soft{border-color:#e5e7eb} .card{background:#fff;border:1px solid #e5e7eb;border-radius:1.25rem;box-shadow:0 8px 24px rgba(15,23,42,.06)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:1rem;padding:.85rem 1.2rem;font-weight:800;transition:.2s}
    .btn-primary{background:var(--primary);color:#fff} .btn-primary:hover{opacity:.95} .btn-light{background:#fff;color:var(--dark);border:1px solid #e5e7eb}
    .pill{display:inline-flex;align-items:center;padding:.35rem .75rem;border-radius:9999px;font-size:.75rem;font-weight:800}
    #toast-container{position:fixed;right:1rem;top:1rem;z-index:80;display:flex;flex-direction:column;gap:.75rem}
    .sidebar-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:.9rem;color:#fff;opacity:.95}
    .sidebar-link:hover,.sidebar-link.active{background:rgba(255,255,255,.08)}
    .muted{color:#64748b} .page-main{flex:1;overflow:auto;padding:1.5rem} @media (max-width:767px){ .page-main{padding:1rem} }
  </style>
</head>
<body class="bg-fundo-claro min-h-screen flex">
<div id="toast-container"></div>

<aside id="sidebar" class="bg-dark-bg w-64 min-h-screen space-y-6 py-7 px-3 absolute inset-y-0 left-0 transform -translate-x-full md:translate-x-0 md:relative transition z-40">
  <a href="seller_dashboard.html" class="text-white flex items-center space-x-2 px-4"><span class="text-2xl font-extrabold tracking-widest text-white">ARIANA MÓVEIS</span></a>
  <nav class="flex flex-col gap-1">
    <a href="seller_dashboard.html" class="sidebar-link"><i class="fas fa-home"></i><span>Dashboard</span></a>
    <a href="seller_produtos.html" class="sidebar-link"><i class="fas fa-box"></i><span>Meus Produtos</span></a>
    <a href="seller_produto_novo.html" class="sidebar-link"><i class="fas fa-plus-circle"></i><span>Cadastrar Produto</span></a>
    <a href="seller_pedidos.html" class="sidebar-link"><i class="fas fa-shopping-cart"></i><span>Pedidos</span></a>
    <a href="seller_vendas.html" class="sidebar-link"><i class="fas fa-chart-line"></i><span>Vendas</span></a>
    <a href="seller_notificacoes.html" class="sidebar-link"><i class="fas fa-bell"></i><span>Notificações</span></a>
    <a href="seller_configuracoes.html" class="sidebar-link"><i class="fas fa-cog"></i><span>Configurações</span></a>
    <a href="seller_devolucoes.html" class="sidebar-link active"><i class="fas fa-exchange-alt"></i><span>Devoluções</span></a>
    <a href="seller_extrato.html" class="sidebar-link"><i class="fas fa-receipt"></i><span>Extrato</span></a>
    <a href="#" id="btn-sair" class="sidebar-link text-red-300 mt-auto"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>
  </nav>
</aside>

<div class="flex-1 flex flex-col min-w-0">
  <header class="flex items-center justify-between p-4 bg-white border-b border-soft shadow-sm">
    <button id="sidebar-toggle" class="text-gray-500 md:hidden"><i class="fas fa-bars text-xl"></i></button>
    <h1 class="text-xl font-semibold text-dark-bg uppercase font-black">Devoluções</h1>
    <div class="flex items-center gap-3">
      <span id="user-display-name" class="text-sm font-black text-gray-700">Olá, sn digital!</span>
      <i class="fas fa-user-circle text-2xl text-primary-blue"></i>
    </div>
  </header>

  <main class="page-main">
    <div class="flex items-start justify-between gap-4 flex-wrap mb-6">
      <div>
        <h2 class="text-3xl font-black text-dark-bg uppercase tracking-tight">Central de devoluções</h2>
        <p class="muted mt-1 font-medium">Gerencie as solicitações de troca e devolução dos seus clientes.</p>
      </div>
      <button id="btn-refresh-returns" class="btn btn-primary shadow-lg"><i class="fas fa-rotate"></i> Atualizar lista</button>
    </div>

    <div id="returns-list" class="space-y-4">
      <div class="card p-10 text-center muted font-bold">Sincronizando com MongoDB...</div>
    </div>
  </main>
</div>

<script>
const API_BASE = "https://ariana-move-mongo.onrender.com/api";
const $ = (id) => document.getElementById(id);

async function loadReturns() {
  const list = $('returns-list');
  try {
    const res = await fetch(`${API_BASE}/seller/returns`);
    const orders = await res.json();

    if (!orders.length) {
      list.innerHTML = '<div class="card p-10 text-center muted font-bold">Nenhuma devolução ou troca pendente.</div>';
      return;
    }

    list.innerHTML = orders.map(o => `
      <div class="card p-6 animate-fade border-l-4 border-primary-blue">
        <div class="flex items-center justify-between gap-3 flex-wrap">
          <div>
            <div class="font-black text-dark-bg text-lg">Pedido #${String(o._id).substring(0,8).toUpperCase()}</div>
            <div class="muted text-xs mt-1 font-bold italic">${new Date(o.updatedAt || o.createdAt).toLocaleString('pt-BR')}</div>
          </div>
          <div class="flex items-center gap-2">
            <span class="pill bg-amber-100 text-amber-700 uppercase font-black text-[10px]">Aguardando Coleta</span>
            <a href="seller_pedido_detalhe.html?id=${o._id}" class="btn btn-light !py-2 !px-3 shadow-sm hover:bg-gray-50"><i class="fas fa-eye text-primary-blue"></i></a>
          </div>
        </div>
        <div class="mt-4 p-4 bg-gray-50 rounded-2xl border border-gray-100 text-sm text-gray-700 italic">
          <i class="fas fa-comment-alt mr-2 text-primary-blue"></i>
          "${o.returnReason || o.reason || 'O cliente solicitou a devolução deste produto através da central de ajuda.'}"
        </div>
      </div>
    `).join('');
  } catch (e) {
    list.innerHTML = '<div class="card p-10 text-center text-red-500 font-bold">Erro de conexão com o servidor.</div>';
  }
}

window.onload = loadReturns;
$('btn-refresh-returns').onclick = loadReturns;
$('sidebar-toggle').onclick = () => $('sidebar').classList.toggle("-translate-x-full");
$('btn-sair').onclick = () => { localStorage.clear(); window.location.href="seller_login.html"; };
</script>
</body>
</html>
