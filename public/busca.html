/* ✅ Payments/Card helper loader (evita 10x/sem desconto e resolve caminho /js/) */
(function(){
  function injectOnce(key, src){
    if (window[key]) return;
    window[key] = true;
    var s = document.createElement('script');
    s.src = src;
    s.defer = true;
    document.head.appendChild(s);
  }
  function loadAll(){
    // core primeiro, payments depois (payments depende do core)
    injectOnce('__CORE_LOADED__', 'js/marketplace-core.js');
    // espera um tiquinho para o core registrar funções globais
    setTimeout(function(){
      injectOnce('__PAYMENTS_LOADED__', 'js/marketplace-core_global_payments.js');
    }, 0);
  }
  if (window.db) loadAll();
  else window.addEventListener('firebase:ready', loadAll, { once:true });
})();
</script>

    <script>
(function () {
  const loaded = new Set();

  function loadScriptSequential(src) {
    return new Promise((resolve, reject) => {
      if (loaded.has(src)) return resolve(true);

      const existing = document.querySelector(`script[data-src="${src}"]`) || document.querySelector(`script[src="${src}"]`);
      if (existing) {
        if (existing.dataset.loaded === "1") {
          loaded.add(src);
          return resolve(true);
        }
        existing.addEventListener("load", () => {
          existing.dataset.loaded = "1";
          loaded.add(src);
          resolve(true);
        }, { once: true });
        existing.addEventListener("error", () => reject(new Error("Falha ao carregar " + src)), { once: true });
        return;
      }

      const s = document.createElement("script");
      s.src = src;
      s.async = false;
      s.defer = false;
      s.dataset.src = src;
      s.onload = () => {
        s.dataset.loaded = "1";
        loaded.add(src);
        resolve(true);
      };
      s.onerror = () => reject(new Error("Falha ao carregar " + src));
      document.head.appendChild(s);
    });
  }

  async function tryCandidates(candidates) {
    for (const src of candidates) {
      try {
        await loadScriptSequential(src);
        return src;
      } catch (_) {}
    }
    throw new Error("Nenhum caminho carregou: " + candidates.join(", "));
  }

  async function ensureMarketplaceHelpers() {
    const coreCandidates = [
      "./marketplace-core.js",
      "./js/marketplace-core.js",
      "/marketplace-core.js",
      "/js/marketplace-core.js"
    ];

    const paymentsCandidates = [
      "./marketplace-core_global_payments.js",
      "./js/marketplace-core_global_payments.js",
      "/marketplace-core_global_payments.js",
      "/js/marketplace-core_global_payments.js"
    ];

    try {
      await tryCandidates(coreCandidates);
      await tryCandidates(paymentsCandidates);

      let tries = 0;
      while (tries < 120) {
        const hasPayments =
          typeof window.decorateProductWithPayments === "function" ||
          typeof window.createProductCard === "function";

        if (hasPayments) {
          window.__MARKETPLACE_HELPERS_READY__ = true;
          window.dispatchEvent(new CustomEvent("marketplace:helpers-ready"));
          return true;
        }

        await new Promise(r => setTimeout(r, 50));
        tries++;
      }

      console.warn("Helpers do marketplace não ficaram prontos a tempo.");
      return false;
    } catch (e) {
      console.error("Erro ao carregar helpers do marketplace:", e);
      return false;
    }
  }

  window.ensureMarketplaceHelpers = ensureMarketplaceHelpers;
})();

// ====== FIX GLOBAL: converte preço BR ("1.299,90") para número (1299.90) ======
// Se os preços vierem do Firestore como string formatada, Number("1.299,90") vira NaN e SOME desconto/12x.
window.__toNumberBR = window.__toNumberBR || function(v, fallback = 0){
  try{
    if (v === null || v === undefined) return fallback;
    if (typeof v === 'number') return Number.isFinite(v) ? v : fallback;
    let s = String(v).trim();
    if (!s) return fallback;
    // remove R$, espaços e caracteres não numéricos exceto . e ,
    s = s.replace(/[R$\s]/g, '').replace(/[^0-9.,-]/g,'');
    const hasComma = s.includes(',');
    const hasDot = s.includes('.');
    if (hasComma && hasDot){
      // 1.234,56 -> 1234.56
      s = s.replace(/\./g,'').replace(',', '.');
    } else if (hasComma && !hasDot){
      // 1234,56 -> 1234.56
      s = s.replace(',', '.');
    }
    const n = parseFloat(s);
    return Number.isFinite(n) ? n : fallback;
  }catch(_e){
    return fallback;
  }
};

            const wanted = String(currentFilters.category || '').toLowerCase();
            const wanted2 = normalizeSlug(currentFilters.categoryName || currentFilters.category);
            const wantedRaw = String(currentFilters.categoryName || '').toLowerCase();

            const candidates = [
                p.categorySlug,
                p.category_slug,
                p.category,
                p.categoria,
                p.categoryName,
                p.category_name,
                p.categoriaNome,
                p.nomeCategoria,
            ].filter(Boolean).map(v => String(v).trim());

            for (const c of candidates) {
                const cLower = c.toLowerCase();
                if (cLower === wanted) return true;
                if (cLower === wantedRaw && wantedRaw) return true;
                if (normalizeSlug(c) === wanted2 && wanted2) return true;
                // se o produto salvou "celulares" sem hífen e o filtro veio com hífen, tenta equivaler
                if (!looksLikeSlug(c) && normalizeSlug(cLower) === wanted2 && wanted2) return true;
            }
            return false;
        };

        const fetchProductsFromFirestore = async () => {
            try {
                const productsRef = collection(db, PRODUCTS_COLLECTION);
                let constraints = [];
                // Importante: para evitar problemas de slug diferente entre painéis/telas,
                // fazemos o filtro de categoria no front (productMatchesCategory).
                // No Firestore, mantemos apenas preço para reduzir volume.
                constraints.push(where("price", "<=", parseFloat(currentFilters.maxPrice)));

                const q = query(productsRef, ...constraints);
                const querySnapshot = await getDocs(q);
                const rawDocs = querySnapshot.docs.map(d => ({ id: d.id, ...d.data() }));
// Resolve imagens: aceita URL direta, path do Storage (ex: "products/abc.jpg"), gs://..., e imagens em arrays/objetos.
const isHttpUrl = (s) => typeof s === 'string' && /^(https?:)?\/\//i.test(s);
const isDataUrl = (s) => typeof s === 'string' && /^data:/i.test(s);
const looksLikeStoragePath = (s) => typeof s === 'string' && s.trim() && !isHttpUrl(s) && !isDataUrl(s) && !s.startsWith('blob:') && !s.startsWith('file:');
const pickFirstImageCandidate = (p) => {
    if (!p) return null;
    const direct = p.imageUrl || p.mainImageUrl || p.mainImage || p.imagemUrl || p.imagem || p.image || null;
    if (typeof direct === 'string' && direct.trim()) return direct.trim();
    // images array
    if (Array.isArray(p.images)) {
        const main = p.images.find(x => x && (x.isMain === true || x.main === true) && (x.url || x.path));
        const any = main || p.images.find(x => x && (x.url || x.path));
        const v = any?.url || any?.path;
        if (typeof v === 'string' && v.trim()) return v.trim();
    }
    // images object {0:{url},1:{url}}
    if (p.images && typeof p.images === 'object') {
        const keys = Object.keys(p.images).sort((a,b)=>parseInt(a)-parseInt(b));
        for (const k of keys) {
            const v = p.images[k]?.url || p.images[k]?.path;
            if (typeof v === 'string' && v.trim()) return v.trim();
        }
    }
    // explicit path
    if (typeof p.mainImagePath === 'string' && p.mainImagePath.trim()) return p.mainImagePath.trim();
    return null;
};
const resolveImageUrl = async (candidate) => {
    if (!candidate) return null;
    const c = String(candidate).trim();
    if (!c) return null;
    if (isHttpUrl(c) || isDataUrl(c)) return c.startsWith('http://') ? ('https://' + c.slice(7)) : c;
    try {
        const r = storageRef(storage, c); // aceita "gs://..." e paths
        return await getDownloadURL(r);
    } catch (e) {
        return null;
    }
};

let products = await Promise.all(rawDocs.map(async (p) => {
    const cand = pickFirstImageCandidate(p);
    const resolved = await resolveImageUrl(cand);
    return { ...p, imageUrlResolved: resolved || null };
}));

// fallback de campo (para render)
products = products.map(p => ({
    ...p,
    // prioridade: resolved -> url existente -> placeholder
    imageUrl: p.imageUrlResolved || p.imageUrl || p.mainImageUrl || (typeof p.imagem === 'string' ? p.imagem : null) || 'https://placehold.co/400x400/CCCCCC/333333?text=SEM+IMAGEM'
}));

return sortProducts(products);
            } catch (error) {
                console.error("Erro Firestore:", error);
                return [];
            }
        };

        const sortProducts = (products) => {
            switch (currentFilters.sort) {
                case 'menor-preco': return products.sort((a, b) => a.price - b.price);
                case 'maior-preco': return products.sort((a, b) => b.price - a.price);
                case 'melhor-avaliacao': return products.sort((a, b) => (b.rating || 0) - (a.rating || 0));
                default: return products.sort((a, b) => a.name.localeCompare(b.name));
            }
        };

        const renderProducts = (products) => {
            const grid = document.getElementById('product-results-grid');
            const status = document.getElementById('search-status');
            const empty = document.getElementById('empty-state');
            const term = currentFilters.query.toLowerCase();

            const filtered = products
              .filter(p => productMatchesCategory(p))
              .filter(p => {
                if (!term) return true;
                const name = String(p.name || p.nome || '').toLowerCase();
                const cat = String(p.categoryName || p.categoriaNome || p.category || p.categoria || '').toLowerCase();
                return name.includes(term) || cat.includes(term);
              });

            grid.innerHTML = '';
            if (filtered.length === 0) {
                empty.classList.remove('hidden');
                status.textContent = `Nenhum resultado para "${currentFilters.query}"`;
                return;
            }

            empty.classList.add('hidden');
            if (currentFilters.category !== 'all') {
                const label = currentFilters.categoryName || currentFilters.category;
                status.textContent = `${filtered.length} resultados em "${label}" para "${currentFilters.query}"`;
            } else {
                status.textContent = `${filtered.length} resultados para "${currentFilters.query}"`;
            }

            const formatPriceParts = (v) => {
                const formatted = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v || 0));
                const noSymbol = formatted.replace('R$', '').trim();
                const parts = noSymbol.split(',');
                return { symbol: 'R$', integer: (parts[0] || '0').trim(), decimal: (parts[1] || '00').trim() };
            };

            const calcPercent = (o, n) => {
                if (!Number.isFinite(o) || !Number.isFinite(n) || o <= n || o <= 0) return 0;
                return Math.round(((o - n) / o) * 100);
            };

            grid.innerHTML = filtered.map(raw => {
                // base do produto (padroniza campos)
                const base = {
                    id: raw.id,
                    name: raw.name || raw.nome || 'Produto',
                    price: Number(raw.price || raw.preco || 0),
                    oldPrice: raw.oldPrice ?? raw.precoAntigo ?? raw.preco_anterior ?? null,
                    imageUrl: raw.imageUrl || raw.mainImageUrl || raw.imagem || raw.image || 'https://placehold.co/400',
                    categoryName: raw.categoryName || raw.categoriaNome || raw.category || raw.categoria || ''
                };

                // ✅ aplica pagamentos globais (settings/payments)
                const p = (typeof window.decorateProductWithPayments === 'function')
                  ? window.decorateProductWithPayments(base)
                  : base;

                const cash = p.__payments?.cash || null;
                const card = p.__payments?.card || null;

                const basePrice = window.__toNumberBR(p.price ?? 0, 0);
                const displayPrice = (cash && cash.enabled) ? window.__toNumberBR(cash.price ?? basePrice, basePrice) : basePrice;

                // desconto: prioridade para oldPrice do produto, senão usa desconto global (PIX/BOLETO)
                const oldP = (p.oldPrice !== null && p.oldPrice !== undefined) ? window.__toNumberBR(p.oldPrice, 0) : NaN;
                const hasOld = Number.isFinite(oldP) && oldP > basePrice;

                let badgePercent = 0;
                let oldPriceToShow = null;

                if (hasOld) {
                    badgePercent = calcPercent(oldP, basePrice);
                    oldPriceToShow = oldP;
                } else if (cash && cash.enabled && Number(cash.discountPercent || 0) > 0) {
                    badgePercent = Number(cash.discountPercent || 0);
                    oldPriceToShow = basePrice;
                }

                const priceParts = formatPriceParts(displayPrice);
                const oldPriceFormatted = oldPriceToShow ? formatCurrency(oldPriceToShow) : null;
                const installmentsText = (card && card.enabled && card.text) ? card.text : 'em até 12x';

                return `
                  <a href="produto.html?id=${p.id}" class="product-card">
                    <div class="product-image-container">
                      ${badgePercent ? `<div class="product-tag-container"><span class="product-tag tag-orange">-${badgePercent}% OFF</span></div>` : ''}
                      <img src="${p.imageUrl}" alt="${p.name}" loading="lazy">
                    </div>
                    <div class="product-card-body">
                      <p class="product-name">${p.name}</p>
                      <div class="mt-auto">
                        ${oldPriceFormatted ? `<p class="product-old-price">${oldPriceFormatted}</p>` : '<p class="product-old-price opacity-0 text-transparent">.</p>'}
                        <div class="product-price">
                          <span class="currency">${priceParts.symbol}</span>
                          <span class="price-integer">${priceParts.integer}</span>
                          <span class="decimal-part">,${priceParts.decimal}</span>
                          <span class="cash-text">à vista</span>
                        </div>
                        <p class="product-installments">${installmentsText}</p>
                      </div>
                    </div>
                  </a>`;
            }).join('');
        };

        document.getElementById('price-range').addEventListener('input', (e) => {
            document.getElementById('max-price-display').textContent = formatCurrency(e.target.value);
            currentFilters.maxPrice = e.target.value;
        });
        document.getElementById('price-range').addEventListener('change', applyFilters);

        window.limparFiltros = () => {
            currentFilters = { query: currentFilters.query, category: 'all', maxPrice: 5000, sort: 'relevancia' };
            document.getElementById('price-range').value = 5000;
            document.getElementById('max-price-display').textContent = formatCurrency(5000);
            applyFilters();
        };

        window.realizarNovaBuscaLocal = () => {
            const val = document.getElementById('campo-busca-local').value;
            if(val) window.location.href = `busca.html?q=${encodeURIComponent(val)}`;
        };

        const setActiveCategoryUI = (slug) => {
            const list = document.getElementById('category-filter');
            if (!list) return;
            list.querySelectorAll('a.filter-link').forEach(a => {
                const isActive = (a.dataset.category || 'all') === (slug || 'all');
                a.classList.toggle('font-bold', isActive);
                a.classList.toggle('text-primary-blue', isActive);
            });
        };

        const bindCategoryClicks = () => {
            const list = document.getElementById('category-filter');
            if (!list) return;
            list.addEventListener('click', (e) => {
                const a = e.target?.closest?.('a.filter-link');
                if (!a) return;
                e.preventDefault();
                const slug = a.dataset.category || 'all';
                const label = a.dataset.label || '';
                currentFilters.category = slug;
                currentFilters.categoryName = label;
                setActiveCategoryUI(slug);
                applyFilters();
            });
        };

        const loadCategoriesSidebar = async () => {
            const list = document.getElementById('category-filter');
            if (!list) return;
            try {
                const catsRef = collection(db, 'categories');
                const qs = await getDocs(query(catsRef, orderBy('order', 'asc')));
                const cats = [];
                qs.forEach(d => cats.push({ id: d.id, ...d.data() }));
                const activeCats = cats.filter(c => c && c.active !== false);

                // mantém o primeiro item (Todas as Categorias)
                list.innerHTML = `
                  <li>
                    <a href="#" class="text-gray-700 hover:text-primary-blue transition-colors filter-link" data-category="all" data-label="">
                      Todas as Categorias
                    </a>
                  </li>
                `;

                if (!activeCats.length) {
                    list.insertAdjacentHTML('beforeend', `
                      <li><span class="text-gray-400 text-xs">Nenhuma categoria ativa.</span></li>
                    `);
                } else {
                    for (const c of activeCats) {
                        const name = String(c.name || c.nome || c.title || 'Categoria').trim();
                        const slug = String(c.slug || c.categorySlug || '').trim() || normalizeSlug(name) || name.toLowerCase();
                        list.insertAdjacentHTML('beforeend', `
                          <li>
                            <a href="#" class="text-gray-700 hover:text-primary-blue transition-colors filter-link" data-category="${slug}" data-label="${name.replace(/"/g,'&quot;')}">
                              ${name}
                            </a>
                          </li>
                        `);
                    }
                }

                bindCategoryClicks();
                setActiveCategoryUI(currentFilters.category);
            } catch (err) {
                console.warn('[busca] não foi possível carregar categorias do Firestore:', err);
                // mantém click do "Todas as categorias" pelo menos
                bindCategoryClicks();
            }
        };

        const init = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            currentFilters.query = urlParams.get('q') || '';
            // Suporte para páginas do tipo categoria.html?name=...
            const categoryFromUrl = urlParams.get('name') || urlParams.get('categoria') || urlParams.get('category');
            if (categoryFromUrl) {
                const decoded = decodeURIComponent(categoryFromUrl);
                currentFilters.categoryName = decoded;
                // slug principal usado nas telas (pode ser diferente do que está gravado). O filtro final é no front.
                currentFilters.category = normalizeSlug(decoded) || String(decoded).toLowerCase().trim();
            }
            if (currentFilters.query) document.getElementById('campo-busca-local').value = currentFilters.query;
            await signInAnonymously(auth);
            await loadCategoriesSidebar();
            try { if (typeof window.loadGlobalPaymentsConfig === 'function') await window.loadGlobalPaymentsConfig(); } catch(_) {}
            applyFilters();
            window.dispatchEvent(new Event('firebase:ready'));
        };

        init();
    </script>

<script>
(function () {
  const tryInitHeader = () => {
    if (typeof window.carregarHeader !== 'function') { setTimeout(tryInitHeader, 60); return; }
    // Aguarda bridge do Firebase (db/doc/getDoc) antes de renderizar categorias/endereço
    if (!(window.db && typeof window.doc === 'function' && typeof window.getDoc === 'function')) { setTimeout(tryInitHeader, 60); return; }

    if (document.querySelector('header[data-ariana="1"]')) return;

      // marca o header inserido
      const h = document.querySelector('header');
      if (h) h.setAttribute('data-ariana','1');
