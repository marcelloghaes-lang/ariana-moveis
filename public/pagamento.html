<body class="bg-slate-50 text-slate-900 font-sans leading-relaxed">

  <div class="max-w-2xl mx-auto px-4 py-8">

    <div id="section-choice" class="space-y-4">

      <button class="btn-choice group" data-method="pix">

        </div>

      <div class="pt-6">
        <button id="btn-continue" disabled class="btn-primary opacity-50 flex items-center justify-center gap-2">
          Continuar
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
        </button>

    <div id="panel-card" class="hidden space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
      <button onclick="showChoice()" class="text-sm font-bold text-slate-400 hover:text-slate-600 flex items-center gap-1 mb-4">

      </button>
      
      <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100">
        <form id="form-checkout" class="space-y-4">
  <div class="grid grid-cols-1 gap-4">

</form>

    <div id="panel-pix" class="hidden space-y-6">

      <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 text-center space-y-6">

        <div id="pix-content" class="hidden space-y-6">

    <div id="panel-boleto" class="hidden space-y-6">
        <button onclick="showChoice()" class="text-sm font-bold text-slate-400 hover:text-slate-600 flex items-center gap-1 mb-4">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg> Voltar
        </button>
        <div class="bg-white rounded-2xl p-8 shadow-sm border border-slate-100 text-center space-y-6">
            <div class="w-20 h-20 bg-amber-50 rounded-full flex items-center justify-center mx-auto text-amber-600">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            </div>
            <h3 class="text-lg font-bold">Boleto Bancário</h3>
            <p class="text-slate-500 text-sm">Ao clicar no botão abaixo, geraremos o boleto para o seu pedido. A compensação leva de 1 a 3 dias úteis.</p>
            <button id="btn-generate-boleto" class="btn-primary">Gerar Boleto Agora</button>

    <div id="order-summary" class="mt-8 pt-8 border-t border-slate-200 hidden">
        <div class="flex items-center justify-between text-slate-500 mb-2">
            <span class="text-sm">Total do Pedido</span>
            <span id="summary-total" class="text-xl font-black text-slate-900">R$ 0,00</span>
        </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, onSnapshot, collection, getDocs, query, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // CONFIGURAÇÃO DO FIREBASE (Mantenha as suas chaves aqui)
    const firebaseConfig = {
  apiKey: "AIzaSyDhwqDaCVUNLQ0cg863fw251ZAjBWZ8WCo",
  authDomain: "ariana-moveis-final.firebaseapp.com",
  projectId: "ariana-moveis-final",
  storageBucket: "ariana-moveis-final.firebasestorage.app",
  messagingSenderId: "695257365498",
  appId: "1:695257365498:web:ef7698ea5d33d701338243",
  measurementId: "G-WNMWLYMW43"
};

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    const orderId = urlParams.get('orderId');

    let currentUser = null;
    let customerProfile = null;
    let orderData = null;

    let customerAddress = null;


    // ======== Desconto dinâmico (mesma regra do Checkout/Produto) ========
    // Fonte única: settings/payments
    let paymentSettings = null;
    let currentPayMethod = null; // "pix" | "boleto" | "card" | null

    async function loadPaymentSettings() {
      try {
        const snap = await getDoc(doc(db, "settings", "payments"));
        if (snap.exists()) paymentSettings = snap.data();
      } catch (e) {
        console.warn("Falha ao carregar settings/payments:", e);
        paymentSettings = null;
      }
      return paymentSettings;
    }

    function getOrderTotalOriginal() {
      const t = orderData?.totals || {};
      const cand =
        t.grandTotalOriginal ??
        t.totalOriginal ??
        orderData?.totalOriginal ??
        orderData?.grandTotalOriginal ??
        t.grandTotal ??
        orderData?.total ??
        0;
      const n = Number(cand || 0);
      return Number.isFinite(n) ? n : 0;
    }

    function getDiscountPercentFor(method) {
      const s = paymentSettings || {};
      if (method === "pix") {
        return (s.pix?.enabled ? Number(s.pix?.discountPercent || 0) : 0) || 0;
      }
      if (method === "boleto") {
        return (s.boleto?.enabled ? Number(s.boleto?.discountPercent || 0) : 0) || 0;
      }
      return 0; // cartão não tem desconto
    }

    function getAmountForMethod(method) {
      const original = getOrderTotalOriginal();
      const desc = getDiscountPercentFor(method);
      if (!desc || desc <= 0) return original;
      const fator = (100 - desc) / 100;
      return Math.max(0, original * fator);
    }

    function formatBRL(v) {
      const n = Number(v || 0);
      return new Intl.NumberFormat("pt-BR", { style: "currency", currency: "BRL" }).format(Number.isFinite(n) ? n : 0);
    }

    function updateSummaryForMethod(method) {
      currentPayMethod = method || currentPayMethod || null;
      const summary = document.getElementById("order-summary");
      const totalEl = document.getElementById("summary-total");
      if (!summary || !totalEl) return;

      const original = getOrderTotalOriginal();
      const amount = getAmountForMethod(currentPayMethod === "card" ? "card" : currentPayMethod);
      const desc = getDiscountPercentFor(currentPayMethod);

      summary.classList.remove("hidden");

      // Total principal (como no ML: no pagamento muda conforme método escolhido)
      totalEl.innerText = formatBRL(amount);

      // Extra: mostra "de R$ X" quando tiver desconto
      let hint = document.getElementById("summary-discount-hint");
      if (!hint) {
        hint = document.createElement("div");
        hint.id = "summary-discount-hint";
        hint.className = "mt-2 text-xs text-slate-500";
        totalEl.parentNode.appendChild(hint);
      }

      if ((currentPayMethod === "pix" || currentPayMethod === "boleto") && desc > 0 && amount < original) {
        hint.innerHTML = `De <span class="line-through">${formatBRL(original)}</span> por <span class="font-bold" style="color:#00a650">${formatBRL(amount)}</span> <span style="color:#00a650" class="font-bold">(${desc}% OFF)</span>`;
      } else {
        hint.innerHTML = "";
      }
    }
    // ======== /Desconto dinâmico ========

    function digitsOnly(v) {
      return String(v || "").replace(/\D+/g, "");
    }

    function normalizeCpf(v) {
      const d = digitsOnly(v);
      // Mercado Pago boleto (CPF) -> 11 dígitos
      return d.length === 11 ? d : d;
    }

    function normalizeAddress(addr) {
      if (!addr || typeof addr !== "object") return null;

      // Aceita formatos do seu Firestore e do pedido
      const street =
        addr.street ||
        addr.street_name ||
        addr.logradouro ||
        addr.address ||
        addr.endereco ||
        "";
      const number =
        addr.number ||
        addr.street_number ||
        addr.numero ||
        "";
      const neighborhood =
        addr.neighborhood ||
        addr.bairro ||
        "";
      const city =
        addr.city ||
        addr.cidade ||
        "";
      const state =
        addr.state ||
        addr.uf ||
        addr.federal_unit ||
        "";
      const zip =
        digitsOnly(addr.zip || addr.zipCode || addr.cep || addr.zip_code || "");

      const cleaned = {
        street: String(street || "").trim(),
        number: String(number || "").trim(),
        neighborhood: String(neighborhood || "").trim(),
        city: String(city || "").trim(),
        state: String(state || "").trim(),
        zip: String(zip || "").trim(),
      };

      // precisa do mínimo para boleto registrado
      if (!cleaned.street || !cleaned.number || !cleaned.neighborhood || !cleaned.state) return cleaned; // ainda retornamos pra debug
      return cleaned;
    }

    async function loadPrimaryAddress(uid) {
      try {
        // tenta subcoleção users/{uid}/addresses
        const q1 = query(collection(db, "users", uid, "addresses"), orderBy("createdAt", "desc"), limit(1));
        const snap1 = await getDocs(q1);
        if (!snap1.empty) return snap1.docs[0].data();

        // fallback: clients/{uid}/addresses (caso seu app use clients)
        const q2 = query(collection(db, "clients", uid, "addresses"), orderBy("createdAt", "desc"), limit(1));
        const snap2 = await getDocs(q2);
        if (!snap2.empty) return snap2.docs[0].data();

        return null;
      } catch (e) {
        console.warn("loadPrimaryAddress failed:", e);
        return null;
      }
    }

    function showPanelLegacy(panelId) {
      document.querySelectorAll(".payment-panel").forEach(p => p.classList.add("hidden"));
      const el = document.getElementById(panelId);
      if (el) el.classList.remove("hidden");
    }

    let mp = null;
    let cardForm = null;
    let orderUnsub = null;

    // ========= UI Helpers =========
    // ========= Data helpers (alinhado com o checkout) =========
    const onlyDigits = (v) => String(v || "").replace(/\D/g, "");
    const pick = (...vals) => {
      for (const v of vals) if (v !== undefined && v !== null && String(v).trim() !== "") return v;
      return "";
    };
    const splitFullName = (full) => {
      const parts = String(full || "").trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return { firstName: "", lastName: "" };
      if (parts.length === 1) return { firstName: parts[0], lastName: "" };
      return { firstName: parts[0], lastName: parts.slice(1).join(" ") };
    };
    const normalizeUF = (uf) => String(uf || "").trim().toUpperCase().slice(0,2);

    function getOrderCpf() {
      return onlyDigits(
        pick(
          customerProfile?.cpf,
          orderData?.customer?.cpf,
          orderData?.cpf,
          orderData?.mp?.payer?.identification?.number
        )
      );
    }

    function getOrderFullName() {
      return pick(
        customerProfile?.name,
        orderData?.customer?.name,
        currentUser?.displayName,
        "Cliente Ariana"
      ).trim();
    }

    
    
    function getMpPayerFromOrder() {
      const name =
        (orderData?.customer?.name || orderData?.customer?.fullName || orderData?.customer?.nome ||
         customerProfile?.name || customerProfile?.fullName || customerProfile?.nome || "").trim();

      const cpfRaw =
        orderData?.customer?.cpf ||
        orderData?.cpf ||
        customerProfile?.cpf ||
        customerProfile?.cpfNumber ||
        customerProfile?.document ||
        customerProfile?.documentNumber ||
        "";

      const cpf = normalizeCpf(cpfRaw);
      const email =
        orderData?.customer?.email ||
        customerProfile?.email ||
        currentUser?.email ||
        "";

      // tenta pegar endereço do pedido primeiro, depois do perfil
      const addr =
        orderData?.address ||
        orderData?.shippingAddress ||
        orderData?.deliveryAddress ||
        orderData?.customer?.address ||
        customerProfile?.address ||
        customerAddress ||
        null;

      const address = normalizeAddress(addr);

      return {
        email,
        first_name: name.split(" ")[0] || name,
        last_name: name.split(" ").slice(1).join(" ") || " ",
        identification: { type: "CPF", number: digitsOnly(cpf) },
        address,
        name,
        cpf
      };
    }

    // ======= Mercado Pago payload normalizado (para evitar erro de parâmetros) =======
    function toMpAddress(addr) {
      const raw = addr || {};
      const a = normalizeAddress(raw) || {};
      const complement = (raw.complement || raw.complemento || raw.apartment || raw.apto || raw.compl || "").toString();

      return {
        zip_code: digitsOnly(a.zip || raw.zip_code || raw.cep || raw.zip || raw.zipCode || ""),
        street_name: (a.street || raw.street_name || raw.logradouro || raw.rua || raw.address || "").toString().trim(),
        street_number: String(a.number || raw.street_number || raw.numero || "S/N"),
        neighborhood: (a.neighborhood || raw.bairro || raw.neighborhood || "").toString().trim(),
        city: (a.city || raw.city_name || raw.cidade || raw.city || "").toString().trim(),
        federal_unit: (a.state || raw.federal_unit || raw.uf || raw.state || "").toString().trim().toUpperCase().slice(0, 2),
        apartment: complement.trim(),
      };
    }

    function getMpPayerStrict() {
      const base = getMpPayerFromOrder();

      const fullName = (base?.name || getOrderFullName() || "Cliente").trim();
      const parts = fullName.split(/\s+/).filter(Boolean);
      const firstName = parts[0] || "Cliente";
      const lastName = parts.length > 1 ? parts.slice(1).join(" ") : "Silva";

      const idNumber = digitsOnly(base?.identification?.number || base?.cpf || getOrderCpf());

      return {
        email: base?.email || currentUser?.email || "",
        first_name: firstName,
        last_name: lastName,
        identification: { type: "CPF", number: idNumber },
        address: toMpAddress(
          orderData?.address ||
          orderData?.shippingAddress ||
          orderData?.deliveryAddress ||
          orderData?.customer?.address ||
          customerProfile?.address ||
          customerAddress ||
          null
        ),
      };
    }
function getMpReceiverAddressFromOrder() {
      const mpAddr = toMpAddress(orderData?.address || {});
      return {
        zip_code: mpAddr.zip_code || "",
        street_name: mpAddr.street_name || "",
        street_number: String(mpAddr.street_number || "S/N"),
        neighborhood: mpAddr.neighborhood || "",
        city_name: mpAddr.city || "",
        state_name: mpAddr.federal_unit || "",
        apartment: mpAddr.apartment || "",
        receiver_name: getOrderFullName()
      };
    }


    function setAlert(type, text) {
      const box = document.getElementById("alert-box");
      box.className = `mb-6 p-4 rounded-xl text-sm font-medium border animate-in fade-in duration-300`;
      if (type === "error") box.classList.add("bg-red-50", "border-red-100", "text-red-700");
      else if (type === "success") box.classList.add("bg-teal-50", "border-teal-100", "text-teal-700");
      else if (type === "loading") box.classList.add("bg-blue-50", "border-blue-100", "text-blue-700");
      box.innerText = text;
      box.classList.remove("hidden");
    }

    function disablePayments(val) {
      document.getElementById("form-checkout__submit").disabled = val;
      document.getElementById("btn-generate-boleto").disabled = val;
    }

    window.showChoice = () => {
      currentPayMethod = null;
      try { updateSummaryForMethod("card"); } catch(e) {}
document.getElementById("section-choice").classList.remove("hidden");
      document.getElementById("panel-card").classList.add("hidden");
      document.getElementById("panel-pix").classList.add("hidden");
      document.getElementById("panel-boleto").classList.add("hidden");
      unmountCardForm();
    };

    function showPanel(id) {
      document.getElementById("section-choice").classList.add("hidden");
      document.getElementById(id).classList.remove("hidden");
    }

    // ========= Mercado Pago Card =========

    // ========= MP Public Key (busca do backend, produção) =========
    async function getMpPublicKey() {
      const res = await fetch("https://api-4dx5luiipq-rj.a.run.app/api/payments/mp/public_key");
      const data = await res.json().catch(() => ({}));

      if (!res.ok || !data || !data.ok || !data.publicKey) {
        const msg = (data && (data.error || data.message)) || "Não foi possível obter a Public Key do Mercado Pago.";
        throw new Error(msg);
      }
      return data.publicKey;
    }

    async function mountCardFormSafe() {
  try {
    if (!orderData) { throw new Error("Pedido ainda está carregando. Aguarde alguns segundos."); }

    if (!mp) {
      const publicKey = await getMpPublicKey();
      mp = new MercadoPago(publicKey, { locale: "pt-BR" });
    }

    // Limpa se já existir para não duplicar campos
    if (cardForm) { unmountCardForm(); }

    cardForm = mp.cardForm({
      amount: String(getAmountForMethod("card")),
      iframe: true,
      form: {
        id: "form-checkout",
        cardNumber: { id: "form-checkout__cardNumber", placeholder: "0000 0000 0000 0000" },
        expirationDate: { id: "form-checkout__expirationDate", placeholder: "MM/AA" },
        securityCode: { id: "form-checkout__securityCode", placeholder: "123" },
        cardholderName: { id: "form-checkout__cardholderName" },
        issuer: { id: "form-checkout__issuer" },
        installments: { id: "form-checkout__installments" },
        identificationType: { id: "form-checkout__identificationType" },
        identificationNumber: { id: "form-checkout__identificationNumber" },
        cardholderEmail: { id: "form-checkout__cardholderEmail" },
      },
      callbacks: {
        onFormMounted: error => {
          if (error) return console.warn("Erro ao montar formulário", error);
          // Preenche dados automáticos do cliente para evitar erro 400
          const payer = getMpPayerFromOrder();

      const cpfDigits = digitsOnly(payer.cpf);
      if (!payer.name || cpfDigits.length !== 11) {
        throw new Error("Verifique se seu CPF (11 dígitos) e Nome estão corretos no perfil.");
      }

      // boleto registrado exige endereço do pagador
      if (!payer.address || !payer.address.street || !payer.address.number || !payer.address.neighborhood || !payer.address.state) {
        throw new Error("Endereço do pagador é obrigatório para boleto registrado. Cadastre um endereço completo no seu perfil.");
      }
          document.getElementById("form-checkout__cardholderEmail").value = payer.email || "";
          document.getElementById("form-checkout__identificationType").value = "CPF";
          document.getElementById("form-checkout__identificationNumber").value = payer.identification?.number || "";
        },
        onSubmit: event => {
          event.preventDefault();
          const formData = cardForm.getCardFormData();
          doPayCard(formData);
        },
        onIdentificationTypesReceived: (error, identificationTypes) => {
            if (error) return console.warn('Erro identificação', error);
        }
      }
    });
  } catch (err) {
    console.error("Falha crítica no SDK:", err);
  }
}

    function unmountCardForm() {
      if (cardForm) {
        try { cardForm.unmount(); cardForm = null; } catch(e){}
      }
    }

    const doPayCard = async (formData) => {
      try {
        setAlert("loading", "Validando cartão junto ao banco...");
        disablePayments(true);

        const response = await fetch("https://api-4dx5luiipq-rj.a.run.app/api/payments/mp/credit", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            // compatibilidade com seu backend atual
            token: formData.token,
            issuer_id: formData.issuerId || formData.issuer_id,
            payment_method_id: formData.paymentMethodId || formData.payment_method_id,
            amount: Number(getAmountForMethod("card")),
            installments: Number(formData.installments || 1),

            // dados do cliente alinhados com o que o checkout salva
            orderId: orderId,
            email: (getMpPayerFromOrder().email || currentUser?.email || ""),
            cpf: (getMpPayerFromOrder().identification?.number || ""),

            // extras (seu backend pode ignorar, mas ajuda se você quiser antifraude/boletos)
            payer: getMpPayerStrict(),
            address: toMpAddress(orderData?.address || {}),
            receiver_address: getMpReceiverAddressFromOrder(),
          }),
        });

        const result = await response.json();

        if (response.ok && result.ok) {
          setAlert("success", "Pagamento aprovado! Preparando seu pedido...");
          setTimeout(() => { window.location.href = "pedido_confirmado.html?orderId=" + orderId; }, 2000);
        } else {
          const msg = result.details?.message || result.error || "Transação não autorizada.";
          setAlert("error", "Erro: " + msg);
          disablePayments(false);
        }
      } catch (e) {
        setAlert("error", "Falha de conexão com o processador de pagamentos.");
        disablePayments(false);
      }
    };

    // ========= PIX Logic =========
    async function generatePix() {
      try {
        if (!orderData) { throw new Error("Pedido ainda está carregando. Aguarde alguns segundos."); }

        const res = await fetch("https://api-4dx5luiipq-rj.a.run.app/api/payments/mp/pix", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            orderId: orderId,
            amount: getAmountForMethod("pix"),
            email: getMpPayerFromOrder().email || currentUser.email,
            cpf: getMpPayerFromOrder().identification?.number || "",
            payer: getMpPayerStrict(),
            address: toMpAddress(orderData?.address || {}),
            receiver_address: getMpReceiverAddressFromOrder(),
          })
        });
        const data = await res.json();
        if (data.ok && data.qrCodeBase64) {
          document.getElementById("pix-loading").classList.add("hidden");
          document.getElementById("pix-content").classList.remove("hidden");
          document.getElementById("pix-qr-img").src = `data:image/png;base64,${data.qrCodeBase64}`;
          document.getElementById("pix-code-input").value = data.qrCode;
        } else {
          throw new Error(data.error || "Falha ao gerar QR Code");
        }
      } catch (e) {
        setAlert("error", "Não foi possível gerar o PIX. Tente novamente.");
        showChoice();
      }
    }

    // ========= Boleto Logic =========
    async function generateBoleto() {
  try {
    if (!orderData) { throw new Error("Pedido ainda está carregando. Aguarde alguns segundos."); }

    setAlert("loading", "Gerando boleto oficial...");
    disablePayments(true);

    // 1. Tratamento do Nome (Obrigatório para Boleto MP)
    const payer = getMpPayerFromOrder();
    const fullName = getOrderFullName();
    const nameParts = fullName.split(" ").filter(Boolean);
    const firstName = nameParts[0] || payer.first_name || "Cliente";
    const lastName = (nameParts.length > 1 ? nameParts.slice(1).join(" ") : (payer.last_name || "Silva"));

    const cleanCpf = payer.identification?.number || getOrderCpf();

    const res = await fetch("https://api-4dx5luiipq-rj.a.run.app/api/payments/mp/boleto", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        orderId: orderId,
        amount: getAmountForMethod("boleto"),
        email: payer.email || currentUser.email,
        cpf: cleanCpf,
        firstName,
        lastName,
        // alinhado com o checkout: address normalizado + payer/shipments
        address: toMpAddress(orderData?.address || {}),
        payer: getMpPayerStrict(),
        receiver_address: getMpReceiverAddressFromOrder(),
      })
    });

    const data = await res.json();

    if (data.ok && (data.ticketUrl || data.ticket_url)) {
      setAlert("success", "Boleto gerado com sucesso!");
      window.open((data.ticketUrl || data.ticket_url), '_blank');
    } else {
      if (data.ok) {
  console.log("MP BOLETO OK:", data);
} else {
  console.error("MP BOLETO ERRO:", data);
}

      // Se o MP retornar erro de parâmetro, mostramos a causa real
      const cause = data.details?.cause?.[0]?.description || data.error || "Verifique se seu CPF e Nome estão corretos no perfil.";
      throw new Error(cause);
    }
  } catch (e) {
    setAlert("error", "Erro: " + e.message);
    disablePayments(false);
  }
}

    // ========= Core Flow =========
    async function watchOrder() {
      if (!orderId) {
        setAlert("error", "ID do pedido não fornecido.");
        return;
      }
      document.getElementById("order-id-display").innerText = `PEDIDO: ${orderId}`;

      const orderRef = doc(db, "orders", orderId);

      orderUnsub = onSnapshot(orderRef, (snap) => {
        if (!snap.exists()) {
          setAlert("error", "Pedido não encontrado em orders.");
          return;
        }
        orderData = snap.data();
        if (orderData?.address) orderData.address = normalizeAddress(orderData.address);

        if (orderData.status === "paid" || orderData.status === "approved") {
          window.location.href = "pedido_confirmado.html?orderId=" + orderId;
          return;
        }

        renderResumo();
      });
    }

    function renderResumo() {
        document.getElementById("order-summary").classList.remove("hidden");
        updateSummaryForMethod(currentPayMethod || "card");
        disablePayments(false);
    }

    async function loadProfile(uid) {
      const snap = await getDoc(doc(db, "users", uid));
      if (snap.exists()) customerProfile = snap.data();
    }

    function bindChoice() {
      if (window.__bindChoiceDone) return;
      window.__bindChoiceDone = true;
      const btns = document.querySelectorAll(".btn-choice");
      const continueBtn = document.getElementById("btn-continue");
      btns.forEach(b => {
        b.addEventListener("click", () => {
          btns.forEach(x => {
            x.classList.remove("active");
            x.querySelector(".radio-indicator").innerHTML = "";
          });
          b.classList.add("active");
          b.querySelector(".radio-indicator").innerHTML = '<div class="w-3 h-3 mx-auto mt-0.5 bg-blue-600 rounded-full"></div>';
          continueBtn.disabled = false;
          continueBtn.style.opacity = "1";
          continueBtn.dataset.method = b.dataset.method;
                  try { updateSummaryForMethod(b.dataset.method); } catch(e) {}
});
      });

      continueBtn.addEventListener("click", () => {
        const method = continueBtn.dataset.method;
        try { updateSummaryForMethod(method); } catch(e) {}
        if (method === "card") {
          showPanel("panel-card");
          mountCardFormSafe();
        } else if (method === "pix") {
          showPanel("panel-pix");
          generatePix();
        } else if (method === "boleto") {
          showPanel("panel-boleto");
        }
      });
    }

    document.addEventListener("DOMContentLoaded", () => {
      try { bindChoice(); } catch(e) {}
    });

    onAuthStateChanged(auth, async (u) => {
      currentUser = u || null;
      if (currentUser?.uid) await loadProfile(currentUser.uid);
      bindChoice();
      await loadPaymentSettings();
      document.getElementById("btn-generate-boleto").addEventListener("click", generateBoleto);
      document.getElementById("btn-copy-pix").addEventListener("click", () => {
        document.getElementById("pix-code-input").select();
        document.execCommand("copy");
        alert("Código Pix copiado!");
      });
      await watchOrder();
    });

  </script>
