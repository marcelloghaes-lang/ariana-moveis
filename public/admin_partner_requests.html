<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Aprovação de Parceiros | ARIANA MÓVEIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/tailwind.min.css">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #F5F7FA; }
    .bg-dark-bg { background-color: #1D2B3A; }
    .bg-primary-blue { background-color: #2E6DA4; }
    #toast-container { position: fixed; top: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 0.5rem; }
    .toast { padding: 1rem 1.5rem; border-radius: 1rem; color: white; font-weight: bold; box-shadow: 0 10px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body class="min-h-screen flex">
  <div id="toast-container"></div>

  <aside class="bg-dark-bg w-64 hidden md:flex flex-col space-y-6 py-7 px-4 text-white">
    <span class="text-2xl font-extrabold tracking-widest px-4">ARIANA MÓVEIS</span>
    <nav class="flex flex-col space-y-2">
      <a href="admin_painel.htm" class="flex items-center space-x-2 py-2.5 px-4 rounded hover:bg-slate-700">
        <i class="fas fa-home w-5"></i><span>Dashboard</span>
      </a>
      <a href="admin_partner_requests.html" class="flex items-center space-x-2 py-2.5 px-4 rounded bg-slate-700">
        <i class="fas fa-store w-5"></i><span>Solicitações</span>
      </a>
    </nav>
  </aside>

  <div class="flex-1 flex flex-col">
    <header class="flex items-center justify-between p-4 bg-white border-b shadow-sm">
      <h1 class="text-xl font-bold text-gray-800">Gerenciar Parceiros</h1>
      <div class="flex items-center space-x-2">
        <span class="text-sm font-medium">Admin Ariana</span>
        <i class="fas fa-user-circle text-2xl text-primary-blue"></i>
      </div>
    </header>

    <main class="p-6">
      <div class="bg-white rounded-2xl shadow-sm border p-6">
        <div class="flex justify-between items-center mb-6">
          <div>
            <h2 class="text-2xl font-black text-gray-800">Solicitações no MongoDB</h2>
            <p class="text-sm text-gray-500">Aprove ou reprove novos parceiros em tempo real.</p>
          </div>
          <button onclick="loadRequests()" class="bg-primary-blue text-white px-5 py-2.5 rounded-xl font-bold hover:opacity-90 transition">
            <i class="fas fa-sync-alt mr-2"></i>Sincronizar
          </button>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-left">
            <thead class="bg-gray-50">
              <tr class="text-xs uppercase text-gray-400 font-bold border-b">
                <th class="px-6 py-4">Loja / CNPJ</th>
                <th class="px-6 py-4">Responsável / Contato</th>
                <th class="px-6 py-4">Status</th>
                <th class="px-6 py-4 text-right">Ações</th>
              </tr>
            </thead>
            <tbody id="tb-requests" class="divide-y">
              <tr><td colspan="4" class="py-10 text-center text-gray-400">Carregando dados do Render...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  
  <script>
    const API_BASE =
      localStorage.getItem("API_BASE") ||
      "https://ariana-move-mongo.onrender.com/api";

    function getAdminToken() {
      return (
        localStorage.getItem("adminToken") ||
        localStorage.getItem("admin_token") ||
        localStorage.getItem("token") ||
        localStorage.getItem("authToken") ||
        ""
      );
    }

    function getHeaders(extra = {}) {
      const token = getAdminToken();
      return {
        "Content-Type": "application/json",
        ...(token ? { Authorization: `Bearer ${token}` } : {}),
        ...extra
      };
    }

    function toast(msg, type = 'info') {
      const el = document.createElement('div');
      el.className = `toast ${type === 'success' ? 'bg-emerald-500' : type === 'error' ? 'bg-rose-500' : 'bg-primary-blue'}`;
      el.textContent = msg;
      document.getElementById('toast-container').appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }

    function normalizeRequests(payload) {
      if (Array.isArray(payload)) return payload;
      if (Array.isArray(payload?.requests)) return payload.requests;
      if (Array.isArray(payload?.items)) return payload.items;
      if (Array.isArray(payload?.data)) return payload.data;
      if (Array.isArray(payload?.partnerRequests)) return payload.partnerRequests;
      if (Array.isArray(payload?.sellers)) return payload.sellers;
      return [];
    }

    async function apiFetch(path, options = {}) {
      const res = await fetch(`${API_BASE}${path}`, {
        ...options,
        headers: getHeaders(options.headers || {})
      });

      const text = await res.text();
      let data = null;

      try {
        data = text ? JSON.parse(text) : null;
      } catch (_) {
        data = text;
      }

      if (!res.ok) {
        throw new Error(
          (data && (data.message || data.error)) ||
          `Erro HTTP ${res.status}`
        );
      }

      return data;
    }

    async function checkAdmin() {
      try {
        const me = await apiFetch("/admin/me");
        return !!(me && (me.admin || me.user || me.data || me));
      } catch (_) {
        return false;
      }
    }

    async function loadRequests() {
      const tbody = document.getElementById('tb-requests');
      try {
        tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-gray-400">Carregando dados do Render...</td></tr>';

        const payload = await apiFetch('/seller/partner-requests');
        const sellers = normalizeRequests(payload);

        if (!sellers || sellers.length === 0) {
          tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-gray-400">Nenhuma solicitação encontrada no MongoDB.</td></tr>';
          return;
        }

        tbody.innerHTML = sellers.map(s => {
          const id = s._id || s.id || '';
          const status = (s.status || 'pendente').toLowerCase();
          const loja = s.factoryName || s.storeName || s.shopName || s.name || 'Sem nome';
          const responsavel = s.ownerName || s.responsavel || s.name || '—';
          const email = s.email || s.contactEmail || '—';
          const cnpj = s.cnpj || s.document || 'Sem CNPJ';
          const statusClass =
            status === 'aprovado'
              ? 'bg-green-100 text-green-700'
              : status === 'reprovado'
              ? 'bg-rose-100 text-rose-700'
              : 'bg-amber-100 text-amber-700';

          return `
            <tr class="hover:bg-gray-50 transition">
              <td class="px-6 py-4">
                <div class="font-bold text-gray-900">${loja}</div>
                <div class="text-xs text-gray-500">${cnpj}</div>
              </td>
              <td class="px-6 py-4 text-sm">
                <div class="font-medium">${responsavel}</div>
                <div class="text-gray-500">${email}</div>
              </td>
              <td class="px-6 py-4">
                <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${statusClass}">${status}</span>
              </td>
              <td class="px-6 py-4 text-right space-x-2">
                <button onclick="updateStatus('${id}', 'aprovado')" class="bg-emerald-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:opacity-90">Aprovar</button>
                <button onclick="updateStatus('${id}', 'reprovado')" class="bg-rose-500 text-white px-3 py-1.5 rounded-lg text-xs font-bold hover:opacity-90">Recusar</button>
              </td>
            </tr>
          `;
        }).join('');
      } catch (e) {
        console.error(e);
        tbody.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-rose-500 font-bold">Erro ao conectar com o Render.</td></tr>';
      }
    }

    async function updateStatus(id, newStatus) {
      if (!confirm(`Deseja alterar o status para ${newStatus}?`)) return;

      try {
        await apiFetch(`/seller/partner-requests/${id}/status`, {
          method: 'PATCH',
          body: JSON.stringify({
            status: newStatus,
            active: newStatus === 'aprovado'
          })
        });

        toast(`Vendedor ${newStatus} com sucesso!`, 'success');
        loadRequests();
      } catch (e) {
        console.error(e);
        toast('Erro ao atualizar status.', 'error');
      }
    }

    window.updateStatus = updateStatus;
    window.loadRequests = loadRequests;

    window.addEventListener('load', async () => {
      const ok = await checkAdmin();
      if (!ok) {
        toast('Acesso negado. Faça login como administrador.', 'error');
        setTimeout(() => {
          window.location.href = 'login_admin.html';
        }, 900);
        return;
      }

      loadRequests();
    });
  </script>

</body>
</html>
