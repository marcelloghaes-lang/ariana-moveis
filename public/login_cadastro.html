<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login / Cadastro | ARIANA MOVEIS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background:#f8f8f8; }

    .tab-content { display:none; }
    .tab-content.active { display:block; }

    .tab-button.active {
      border-bottom:3px solid #2E6DA4;
      color:#2E6DA4;
      font-weight:700;
    }
  </style>
</head>

<body>

<div class="flex justify-center items-center min-h-screen px-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-xl overflow-hidden">

    <div id="message" class="p-3 text-center text-sm font-bold hidden"></div>

    <!-- TABS -->
    <div class="flex border-b">
      <button class="tab-button active flex-1 p-4" data-tab="login">Entrar</button>
      <button class="tab-button flex-1 p-4" data-tab="register">Cadastrar</button>
    </div>

    <!-- LOGIN -->
    <div id="tab-login" class="tab-content active p-6">
      <h2 class="text-xl font-bold mb-4 text-center">Entrar</h2>

      <form id="login-form" class="space-y-4">
        <input type="email" id="login-email" placeholder="E-mail" class="w-full border p-3 rounded" required>
        <input type="password" id="login-password" placeholder="Senha" class="w-full border p-3 rounded" required>

        <button class="w-full bg-blue-600 text-white p-3 rounded font-bold">
          Entrar
        </button>
      </form>
    </div>

    <!-- REGISTER -->
    <div id="tab-register" class="tab-content p-6">
      <h2 class="text-xl font-bold mb-4 text-center">Cadastrar</h2>

      <form id="register-form" class="space-y-4">
        <input type="text" id="register-name" placeholder="Nome" class="w-full border p-3 rounded" required>
        <input type="email" id="register-email" placeholder="E-mail" class="w-full border p-3 rounded" required>
        <input type="password" id="register-password" placeholder="Senha" class="w-full border p-3 rounded" required>

        <button class="w-full bg-blue-600 text-white p-3 rounded font-bold">
          Criar Conta
        </button>
      </form>
    </div>

  </div>
</div>

<script>
const API_BASE =
  localStorage.getItem("API_BASE") ||
  window.API_BASE ||
  "https://ariana-move-mongo.onrender.com/api";

window.API_BASE = API_BASE;

function showMsg(text, type="ok"){
  const el = document.getElementById("message");
  el.classList.remove("hidden");
  el.className = "p-3 text-center text-sm font-bold " + (type==="ok"?"text-green-600":"text-red-600");
  el.innerText = text;
}

function getRedirect(){
  const url = new URL(window.location.href);
  return url.searchParams.get("redirect") || "index.html";
}

// TAB SWITCH
document.querySelectorAll(".tab-button").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".tab-button").forEach(b=>b.classList.remove("active"));
    document.querySelectorAll(".tab-content").forEach(c=>c.classList.remove("active"));

    btn.classList.add("active");
    document.getElementById("tab-"+btn.dataset.tab).classList.add("active");
  }
});

// LOGIN
document.getElementById("login-form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  try{
    const res = await fetch(API_BASE + "/auth/login", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        email: document.getElementById("login-email").value,
        password: document.getElementById("login-password").value
      })
    });

    const data = await res.json();

    if(!res.ok) throw new Error(data.error || "Erro login");

    localStorage.setItem("currentUser", JSON.stringify(data.user));

    showMsg("Login realizado com sucesso");

    setTimeout(()=>{
      window.location.href = getRedirect();
    },1000);

  }catch(err){
    showMsg(err.message,"error");
  }
});

// REGISTER
document.getElementById("register-form").addEventListener("submit", async (e)=>{
  e.preventDefault();

  try{
    const res = await fetch(API_BASE + "/auth/register", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        name: document.getElementById("register-name").value,
        email: document.getElementById("register-email").value,
        password: document.getElementById("register-password").value
      })
    });

    const data = await res.json();

    if(!res.ok) throw new Error(data.error || "Erro cadastro");

    showMsg("Conta criada com sucesso");

    setTimeout(()=>{
      window.location.href = getRedirect();
    },1000);

  }catch(err){
    showMsg(err.message,"error");
  }
});
</script>

</body>
</html>
