<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Início | ARIANA MÓVEIS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="/favicon.png">

  <link rel="stylesheet" href="css/tailwind.min.css">
</head>

<body class="bg-fundo-claro font-sans text-text-dark">

<body class="bg-fundo min-h-screen">
    <header class="w-full shadow-xl bg-primary-blue text-white p-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="dashboard_seller.html" class="text-2xl font-bold uppercase tracking-tighter">Ariana Móveis</a>
            <div class="flex items-center gap-4">
                <span id="seller-name" class="text-xs font-bold opacity-80">Carregando...</span>
                <i class="fas fa-wallet"></i>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 md:p-12">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6">
                <div class="bg-dark-bg text-white p-8 rounded-3xl shadow-2xl relative overflow-hidden">
                    <div class="relative z-10">
                        <h3 class="text-xs font-black opacity-60 uppercase tracking-widest mb-2">Saldo Líquido a Receber</h3>
                        <p id="total-balance" class="text-4xl font-black">R$ 0,00</p>
                        <p class="text-[10px] opacity-50 mt-2 italic">* Já descontada a taxa de 10% da plataforma</p>
                        
                        <button id="btn-saque" class="mt-8 w-full bg-white text-dark-bg py-4 rounded-2xl font-black text-xs hover:bg-primary-blue hover:text-white transition-all">
                            SOLICITAR SAQUE
                        </button>
                    </div>
                    <i class="fas fa-coins absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
                </div>

                <div class="bg-white p-6 rounded-3xl border border-gray-100 shadow-sm">
                    <h3 class="text-[10px] font-black text-gray-400 uppercase mb-4 tracking-widest">Conta para Depósito</h3>
                    <div id="bank-info" class="space-y-1">
                        <p class="text-sm font-bold text-gray-700">Carregando dados bancários...</p>
                    </div>
                    <a href="configuracoes_parceiro.html" class="text-[10px] text-primary-blue font-bold mt-4 block hover:underline italic">Alterar dados nas configurações →</a>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-4">
                <h2 class="text-xl font-black text-dark-bg uppercase tracking-tight mb-4">Histórico de Vendas (Valores Líquidos)</h2>
                <div id="history-container" class="space-y-3">
                    </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, collection, query, getDocs, getDoc, doc, orderBy } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhwqDaCVUNLQ0cg863fw251ZAjBWZ8WCo",
            authDomain: "ariana-moveis-final.firebaseapp.com",
            projectId: "ariana-moveis-final",
            storageBucket: "ariana-moveis-final.firebasestorage.app",
            messagingSenderId: "695257365498",
            appId: "1:695257365498:web:8e68494de6c4c9ecf67c70"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const brl = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(Number(v || 0));
        const TAXA_COMISSAO = 0.10;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                loadFinanceData(user.uid);
            } else {
                window.location.href = "login_seller.html";
            }
        });

        async function loadFinanceData(sellerId) {
            try {
                // 1. Dados do Vendedor
                const sellerSnap = await getDoc(doc(db, "sellers", sellerId));
                if (sellerSnap.exists()) {
                    const data = sellerSnap.data();
                    document.getElementById('seller-name').textContent = data.factoryName || "Parceiro";
                    document.getElementById('bank-info').innerHTML = `
                        <p class="text-sm font-bold text-gray-700">${data.bankName || 'Não informado'}</p>
                        <p class="text-xs text-gray-500">Ag: ${data.bankAgency || '---'} | CC: ${data.bankAccount || '---'}</p>
                    `;
                }

                // 2. Vendas e Cálculos
                const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                let totalLiquidoAcumulado = 0;
                let html = '';

                querySnapshot.forEach((orderDoc) => {
                    const order = orderDoc.data();
                    // Proteção contra campos nulos ou inexistentes
                    const itemsArr = (order && Array.isArray(order.items)) ? order.items : [];
                    const myItems = itemsArr.filter(item => item && item.sellerId === sellerId);

                    if (myItems.length > 0) {
                        // Calcula o Bruto com Number() para evitar NaN
                        const bruto = myItems.reduce((acc, item) => acc + (Number(item.price || 0) * Number(item.quantity || 1)), 0);
                        
                        // Aplica a comissão
                        const liquido = bruto * (1 - TAXA_COMISSAO);
                        totalLiquidoAcumulado += liquido;

                        const date = (order.createdAt && typeof order.createdAt.toDate === 'function') 
                            ? order.createdAt.toDate().toLocaleDateString('pt-BR') 
                            : 'Recente';

                        html += `
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 flex justify-between items-center">
                                <div>
                                    <p class="text-[10px] font-black text-gray-400 uppercase">Pedido #${orderDoc.id.substring(0,6)}</p>
                                    <p class="text-sm font-bold text-dark-bg">${date}</p>
                                    <p class="text-[10px] text-gray-400">Bruto: ${brl(bruto)} (Taxa: 10%)</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-sm font-black text-green-600">+ ${brl(liquido)}</p>
                                    <span class="text-[9px] font-bold bg-green-50 text-green-700 px-2 py-1 rounded-md uppercase">Líquido</span>
                                </div>
                            </div>
                        `;
                    }
                });

                document.getElementById('total-balance').textContent = brl(totalLiquidoAcumulado);
                document.getElementById('history-container').innerHTML = html || '<p class="text-center py-10 text-gray-400">Nenhuma venda encontrada.</p>';

                // Ação do Botão de Saque
                document.getElementById('btn-saque').onclick = () => {
                    if (totalLiquidoAcumulado > 0) {
                        alert(`Sua solicitação de saque de ${brl(totalLiquidoAcumulado)} foi enviada para análise!`);
                    } else {
                        alert("Você não possui saldo disponível para saque.");
                    }
                };

            } catch (error) {
                console.error("Erro ao carregar dados financeiros:", error);
                alert("Erro ao carregar dados financeiros. Verifique o console.");
            }
        }
    </script>
    <script src="marketplace-core.js"></script>
    <script src="marketplace-core_global_payments.js"></script>

     <script src="js/layout-fit.js" defer></script>

   <script src="js/header_auth_fix.js"></script>

   <script src="js/header_auth_fix.js" defer></script>

</body>
</html>
