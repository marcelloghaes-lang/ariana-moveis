<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Configurações | ARIANA MÓVEIS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/tailwind.min.css">
  <style>
    :root {
      --primary:#2E6DA4; --dark:#0f172a; --bg:#F5F7FA; --success:#16a34a; --danger:#dc2626; --warning:#ea580c;
    }
    body { font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: var(--bg); }
    .bg-primary-blue{background:var(--primary)} .text-primary-blue{color:var(--primary)} .bg-dark-bg{background:var(--dark)}
    .text-dark-bg{color:var(--dark)} .bg-fundo-claro{background:var(--bg)} .bg-success-green{background:var(--success)}
    .bg-error-red{background:var(--danger)} .border-soft{border-color:#e5e7eb} .card{background:#fff;border:1px solid #e5e7eb;border-radius:1.25rem;box-shadow:0 8px 24px rgba(15,23,42,.06)}
    .input{width:100%;border:1px solid #d1d5db;border-radius:1rem;padding:.85rem 1rem;outline:none;background:#fff}
    .input:focus{box-shadow:0 0 0 4px rgba(46,109,164,.12);border-color:var(--primary)}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;border-radius:1rem;padding:.85rem 1.2rem;font-weight:800;transition:.2s}
    .btn-primary{background:var(--primary);color:#fff} .btn-primary:hover{opacity:.95} .btn-dark{background:var(--dark);color:#fff}
    .btn-light{background:#fff;color:var(--dark);border:1px solid #e5e7eb} .pill{display:inline-flex;align-items:center;padding:.35rem .75rem;border-radius:9999px;font-size:.75rem;font-weight:800}
    .toast{box-shadow:0 10px 30px rgba(0,0,0,.12)}
    #toast-container{position:fixed;right:1rem;top:1rem;z-index:80;display:flex;flex-direction:column;gap:.75rem}
    .sidebar-link{display:flex;align-items:center;gap:.75rem;padding:.8rem 1rem;border-radius:.9rem;color:#fff;opacity:.95}
    .sidebar-link:hover,.sidebar-link.active{background:rgba(255,255,255,.08)}
    .stat{padding:1.25rem;border-radius:1.25rem;background:#fff;border:1px solid #e5e7eb;box-shadow:0 8px 24px rgba(15,23,42,.05)}
    .muted{color:#64748b} .table-wrap{overflow:auto} table{width:100%;border-collapse:collapse} th,td{padding:1rem;border-bottom:1px solid #eef2f7;vertical-align:top} th{font-size:.75rem;text-transform:uppercase;letter-spacing:.06em;color:#64748b;text-align:left}
    .page-main{flex:1;overflow:auto;padding:1.5rem} @media (max-width:767px){ .page-main{padding:1rem} }
  </style>
</head>
<body class="bg-fundo-claro min-h-screen flex">
<div id="toast-container"></div>
<aside id="sidebar" class="bg-dark-bg w-64 min-h-screen space-y-6 py-7 px-3 absolute inset-y-0 left-0 transform -translate-x-full md:translate-x-0 md:relative transition z-40">
  <a href="seller_dashboard.html" class="text-white flex items-center space-x-2 px-4"><span class="text-2xl font-extrabold tracking-widest">ARIANA MÓVEIS</span></a>
  <nav class="flex flex-col gap-1">
    <a href="seller_dashboard.html" class="sidebar-link "><i class="fas fa-home"></i><span>Dashboard</span></a>
    <a href="seller_produtos.html" class="sidebar-link "><i class="fas fa-box"></i><span>Meus Produtos</span></a>
    <a href="seller_produto_novo.html" class="sidebar-link "><i class="fas fa-plus-circle"></i><span>Cadastrar Produto</span></a>
    <a href="seller_pedidos.html" class="sidebar-link "><i class="fas fa-shopping-cart"></i><span>Pedidos</span></a>
    <a href="seller_vendas.html" class="sidebar-link "><i class="fas fa-chart-line"></i><span>Vendas</span></a>
    <a href="seller_notificacoes.html" class="sidebar-link "><i class="fas fa-bell"></i><span>Notificações</span></a>
    <a href="seller_configuracoes.html" class="sidebar-link active"><i class="fas fa-cog"></i><span>Configurações</span></a>
    <a href="seller_devolucoes.html" class="sidebar-link "><i class="fas fa-exchange-alt"></i><span>Devoluções</span></a>
    <a href="seller_extrato.html" class="sidebar-link "><i class="fas fa-receipt"></i><span>Extrato</span></a>
    <a href="#" id="btn-sair" class="sidebar-link text-red-300"><i class="fas fa-sign-out-alt"></i><span>Sair</span></a>
  </nav>
</aside>
<div class="flex-1 flex flex-col min-w-0">
<header class="flex items-center justify-between p-4 bg-white border-b border-soft shadow-sm">
  <button id="sidebar-toggle" class="text-gray-500 md:hidden"><i class="fas fa-bars text-xl"></i></button>
  <h1 class="text-xl font-semibold text-dark-bg">Configurações</h1>
  <div class="flex items-center gap-3">
    <span id="user-display-name" class="text-sm font-medium text-gray-700">Bem-vindo, Seller!</span>
    <i class="fas fa-user-circle text-2xl text-primary-blue"></i>
  </div>
</header>
<main class="page-main">

<div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-6"><div><h2 class="text-4xl font-extrabold text-slate-800 tracking-tight">Ajustes da Conta</h2><p class="muted text-lg font-medium">Configure seus dados internos e o perfil público da loja.</p></div><button type="submit" form="settings-form" id="save-btn" class="btn btn-primary"><i class="fas fa-check-double"></i>Salvar alterações</button></div>
<form id="settings-form" class="space-y-6 max-w-5xl"><div class="card p-6"><h3 class="text-xl font-black mb-5">Dados gerais</h3><div class="grid md:grid-cols-2 gap-5"><div><label class="block text-xs font-black mb-2">Nome Fantasia</label><input id="factoryName" class="input" required></div><div><label class="block text-xs font-black mb-2">CNPJ</label><input id="cnpj" class="input" readonly></div><div class="md:col-span-2"><label class="block text-xs font-black mb-2">Descrição pública</label><textarea id="bio" rows="4" class="input"></textarea></div></div></div><div class="card p-6"><h3 class="text-xl font-black mb-5">Pagamento</h3><div class="grid md:grid-cols-3 gap-5"><div><label class="block text-xs font-black mb-2">Banco</label><input id="bankName" class="input"></div><div><label class="block text-xs font-black mb-2">Agência</label><input id="bankAgency" class="input"></div><div><label class="block text-xs font-black mb-2">Conta</label><input id="bankAccount" class="input"></div></div></div><div class="card p-6"><h3 class="text-xl font-black mb-5">Frete e coleta</h3><div class="grid md:grid-cols-2 gap-5 items-center"><div><label class="block text-xs font-black mb-2">CEP base de coleta</label><input id="cepColeta" class="input" placeholder="00000-000"></div><label class="inline-flex items-center gap-3 font-bold"><input id="transpPropria" type="checkbox"> Transportadora própria / terceirizada</label></div></div></form>
</main></div>
<script>
const API_BASE =
  window.API_BASE ||
  localStorage.getItem("API_BASE") ||
  "http://localhost:3000/api";

const $ = (id) => document.getElementById(id);

function getToken(){
  return localStorage.getItem("seller_token") || "";
}

function toast(message, type='info') {
  const c = $('toast-container'); if (!c) return alert(message);
  const el = document.createElement('div');
  const color = type==='success' ? 'bg-success-green' : type==='error' ? 'bg-error-red' : 'bg-primary-blue';
  el.className = `toast ${color} text-white px-4 py-3 rounded-2xl`;
  el.textContent = message; c.appendChild(el);
  setTimeout(()=>{el.style.opacity='0'; setTimeout(()=>el.remove(),300)}, 3400);
}

// ===== LOGOUT =====
$('btn-sair')?.addEventListener('click', ()=>{
  localStorage.removeItem("seller_token");
  window.location.href="seller_login.html";
});

// ===== MÁSCARA CEP =====
$('cepColeta')?.addEventListener('input', (e)=>{
  let v=e.target.value.replace(/\D/g,'').slice(0,8);
  e.target.value = v.length>5 ? v.slice(0,5)+'-'+v.slice(5) : v;
});

// ===== LOAD SELLER =====
async function loadSeller(){
  try{
    const res = await fetch(API_BASE + "/seller/me",{
      headers:{ Authorization:`Bearer ${getToken()}` }
    });

    const seller = await res.json();

    $('user-display-name').textContent =
      `Bem-vindo, ${seller.factoryName || seller.storeName || seller.name || seller.email || 'Seller'}!`;

    $('factoryName').value = seller.factoryName || seller.storeName || seller.name || '';
    $('cnpj').value = seller.cnpj || seller.cpf_cnpj || '';
    $('bio').value = seller.bio || seller.description || '';

    const bank = seller.bankAccount || {};

    $('bankName').value = bank.bank || seller.bankName || '';
    $('bankAgency').value = bank.agency || seller.bankAgency || '';
    $('bankAccount').value = bank.account || seller.bankAccount || '';

    $('cepColeta').value = seller.cepColeta || bank.cepOrigem || '';
    $('transpPropria').checked = !!seller.transpPropria;

  }catch(e){
    console.error(e);
    window.location.href="seller_login.html";
  }
}

// ===== SAVE =====
$('settings-form').addEventListener('submit', async (e)=>{
  e.preventDefault();

  const btn = $('save-btn');
  btn.disabled=true;
  btn.textContent='Salvando...';

  try{
    const payload = {
      factoryName: $('factoryName').value.trim(),
      bio: $('bio').value.trim(),
      bankAccount:{
        bank:$('bankName').value.trim(),
        agency:$('bankAgency').value.trim(),
        account:$('bankAccount').value.trim(),
        cepOrigem:$('cepColeta').value.replace(/\D/g,'')
      },
      cepColeta:$('cepColeta').value.replace(/\D/g,''),
      transpPropria:$('transpPropria').checked
    };

    await fetch(API_BASE + "/seller/update",{
      method:"PUT",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${getToken()}`
      },
      body: JSON.stringify(payload)
    });

    toast('Configurações salvas com sucesso.','success');

  }catch(e){
    console.error(e);
    toast('Erro ao salvar configurações.','error');
  }

  btn.disabled=false;
  btn.innerHTML='<i class="fas fa-check-double"></i> Salvar alterações';
});

// ===== INIT =====
loadSeller();
</script>
<script src="js/layout-fit.js" defer></script>
</body></html>
