<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <title>Início | ARIANA MÓVEIS</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="icon" type="image/png" href="/favicon.png">

  <link rel="stylesheet" href="css/tailwind.min.css">
</head>

<body class="bg-fundo-claro font-sans text-text-dark">

  <style>
    /* Mantenha apenas o CSS que for MUITO específico desta página */
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F5F7FA; /* fundo-claro */
    }
        body {
            font-family: 'Inter', sans-serif;
            background-color: theme('colors.fundo');
        }
        /* Estilo para o contador do carrinho no header */
        .contador-carrinho {
            position: absolute;
            top: -5px;
            right: -10px;
            background-color: theme('colors.primary-blue');
            color: white;
            border-radius: 9999px; 
            padding: 0 6px;
            font-size: 0.7em;
            line-height: 1.5; 
            font-weight: bold;
            display: none;
        }
        /* Estilo para o loader de carregamento */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid theme('colors.primary-blue');
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Estilos para os badges de status de pedido */
        .status-badge {
            @apply px-3 py-1 text-xs font-bold rounded-full uppercase tracking-wider shadow-sm;
            white-space: nowrap; 
        }
        .status-Pendente { @apply bg-yellow-100 text-yellow-800; }
        .status-Em-Processamento { @apply bg-blue-100 text-blue-800; }
        .status-Enviado { @apply bg-indigo-100 text-indigo-800; }
        .status-Entregue { @apply bg-green-100 text-green-800; }
        .status-Cancelado { @apply bg-red-100 text-red-800; }
        .status-Pendente-de-Pagamento { @apply bg-orange-100 text-orange-800; }

        /* Correção Dropdown Categorias */
        #category-dropdown.active {
            display: block;
            max-height: 500px;
            opacity: 1;
        }

        .category-menu::-webkit-scrollbar {
            display: none;
        }
        .category-menu {
            -ms-overflow-style: none; 
            scrollbar-width: none; 
        }

    </style>

    <body class="bg-fundo-claro min-h-screen">
    
    <main id="main-content-container" class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8 min-h-[70vh]" style="display:none;">
        
        <h1 class="text-3xl sm:text-4xl font-extrabold text-text-dark mb-8 border-b pb-4 flex items-center">
            <i class="fas fa-receipt mr-3 text-primary-blue"></i> Histórico de Pedidos
        </h1>

        <div id="loading-area" class="text-center py-20">
            <div class="loader mx-auto"></div>
            <p class="mt-4 text-gray-600">Carregando seus pedidos...</p>
        </div>
        
        <div id="pedidos-lista" class="space-y-6">
            </div>

        <div id="no-orders-message" class="hidden text-center py-16 bg-white rounded-xl shadow-lg mt-8">
            <i class="fas fa-box-open text-6xl text-gray-300"></i>
            <h2 class="text-2xl font-bold text-gray-700 mt-4">Nenhum pedido encontrado.</h2>
            <p class="text-gray-500 mt-2">Parece que você ainda não fez nenhuma compra. <a href="index.html" class="text-primary-blue font-medium hover:underline">Comece a comprar agora!</a></p>
        </div>

    </main>
    
    <script type="module">
        const FALLBACK_FIREBASE_CONFIG = {
            apiKey: "AIzaSyDhwqDaCVUNLQ0cg863fw251ZAjBWZ8WCo", 
            authDomain: "ariana-moveis-final.firebaseapp.com",
            projectId: "ariana-moveis-final",
            storageBucket: "ariana-moveis-final.firebasestorage.app",
            messagingSenderId: "695257365498",
            appId: "1:695257365498:web:8e68494de6c4c9ecf67c70",
        };

        const firebaseConfig = FALLBACK_FIREBASE_CONFIG;
        
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            setPersistence,
            browserLocalPersistence,
            signInAnonymously
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            onSnapshot, 
            collection, 
            query,
            doc,
            getDoc,
            setLogLevel 
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        setLogLevel('Debug');
        
        let db = null;
        let auth = null;
        let userId = null;

        // UI CATEGORIAS
        const catBtn = document.getElementById('category-dropdown-btn');
        const catMenu = document.getElementById('category-dropdown');
        catBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            catMenu.classList.toggle('hidden');
            catMenu.classList.toggle('active');
        });
        document.addEventListener('click', () => {
            catMenu?.classList.add('hidden');
            catMenu?.classList.remove('active');
        });

        // BARRA DE PESQUISA
        window.applySearchFilter = (event) => {
            event.preventDefault();
            const input = document.getElementById('search-input-desktop');
            const term = input ? input.value.trim() : "";
            if (term) window.location.href = `todos_produtos.html?q=${encodeURIComponent(term)}`;
        };

        // ATUALIZAÇÃO DE ENDEREÇO
        async function loadClientAddress(user) {
            const addressSpan = document.querySelector('#client-address-display span');
            if (!addressSpan) return;
            if (user && !user.isAnonymous) {
                try {
                    const userDoc = await getDoc(doc(db, "users", user.uid));
                    if (userDoc.exists() && userDoc.data().address) {
                        const addr = userDoc.data().address;
                        addressSpan.textContent = `${addr.street}, ${addr.number} - ${addr.city}`;
                        return;
                    }
                } catch (e) { console.error(e); }
            }
            addressSpan.textContent = "Rua Olegário de Andrade, 54A - Guanhães/MG";
        }

        const loadingArea = document.getElementById('loading-area');
        const pedidosLista = document.getElementById('pedidos-lista');
        const noOrdersMessage = document.getElementById('no-orders-message');

        window.updateClientHeaderUI = (user) => {
            const clientStatusDisplay = document.getElementById('client-status-display');
            const clientAccountLink = document.getElementById('client-account-link');
            if (!clientStatusDisplay || !clientAccountLink) return;

            if (user && !user.isAnonymous) {
                const displayName = user.displayName || user.email?.split('@')[0] || 'Cliente';
                clientStatusDisplay.innerHTML = `<span class="text-sm font-semibold">Olá, ${displayName}</span><span class="text-sm text-gray-300">Minha Conta</span>`;
                clientAccountLink.href = 'minha_conta.html'; 
            } else {
                clientStatusDisplay.innerHTML = `<span class="text-sm font-semibold">Entre ou Cadastre-se</span><span class="text-sm text-gray-300">para ver seus produtos</span>`;
                clientAccountLink.href = 'login_cadastro.html'; 
            }
        };

        const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        const formatDate = (isoString) => {
            if (!isoString) return 'Data Indisponível';
            return new Date(isoString).toLocaleDateString('pt-BR', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        };
        
        const createOrderCardHtml = (order) => {
            const displayOrderId = order.orderId ? order.orderId.substring(0, 8).toUpperCase() : 'N/A';
            const statusClass = `status-${order.status ? order.status.replace(/\s/g, '-') : 'Pendente'}`;
            const itens = order.itens || [];
            return `
                <div class="bg-white rounded-xl shadow-lg border border-gray-100 transition-all duration-300 hover:shadow-xl">
                    <div class="p-6 border-b border-gray-100 bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center rounded-t-xl">
                        <div><h2 class="text-xl font-bold">Pedido #${displayOrderId}</h2><p class="text-sm text-gray-500">Realizado em: ${formatDate(order.dataCriacao)}</p></div>
                        <span class="${statusClass} status-badge">${order.status || 'Pendente'}</span>
                    </div>
                    <div class="p-6"><div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div><h3 class="font-semibold text-primary-blue mb-2">Entrega</h3><p class="text-sm">${order.endereco?.rua || 'N/A'}, ${order.endereco?.numero || 'S/N'}</p></div>
                        <div><h3 class="font-semibold text-primary-blue mb-2">Pagamento</h3><p class="text-sm font-bold">${formatCurrency(order.valorTotal || 0)}</p></div>
                        <div><h3 class="font-semibold text-primary-blue mb-2">Itens (${itens.length})</h3><p class="text-sm">${itens.length > 0 ? itens[0].nome : 'Nenhum item'}</p></div>
                    </div></div>
                </div>`;
        };
        
        const monitorPedidosCollection = (currentUserId) => {
            const q = query(collection(db, "artifacts", "ariana-moveis-final", "users", currentUserId, "pedidos"));
            onSnapshot(q, (snapshot) => {
                const orders = [];
                snapshot.forEach(doc => orders.push({ orderId: doc.id, ...doc.data() }));
                loadingArea.classList.add('hidden');
                if (orders.length === 0) { noOrdersMessage.classList.remove('hidden'); return; }
                noOrdersMessage.classList.add('hidden');
                pedidosLista.innerHTML = orders.map(createOrderCardHtml).join('');
            });
        };

        const checkAuthAndInit = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                const contentContainer = document.getElementById('main-content-container');
                
                await setPersistence(auth, browserLocalPersistence);

                onAuthStateChanged(auth, (user) => {
                    window.updateClientHeaderUI(user);
                    loadClientAddress(user);
                    if (user && !user.isAnonymous) {
                        userId = user.uid;
                        loadingArea.classList.add('hidden');
                        if (contentContainer) contentContainer.style.display = 'block';
                        monitorPedidosCollection(userId); 
                    } else {
                        loadingArea.innerHTML = `<p class="text-error-red font-bold">Acesso Negado. Redirecionando...</p>`;
                        setTimeout(() => window.location.href = `login_cadastro.html`, 2000);
                    }
                });
            } catch (error) { console.error(error); }
        };

        document.addEventListener('DOMContentLoaded', checkAuthAndInit);
    </script>
    <script src="js/header_auth_fix.js"></script>
    <script src="./header.js"></script>
<script>
  window.carregarHeader();
</script>

    <script src="marketplace-core.js"></script>
    <script src="marketplace-core_global_payments.js"></script>

     <script src="js/layout-fit.js" defer></script>

    <script src="footer.js" defer></script>

   <script src="js/header_auth_fix.js"></script>

   <script src="js/header_auth_fix.js" defer></script>

</body>
</html>
