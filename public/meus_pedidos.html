<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARIANA MOVEIS | Meus Pedidos</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="icon" href="https://placehold.co/16x16/2E6DA4/ffffff?text=AM" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/png" href="/favicon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        'primary-blue': '#2E6DA4', 
                        'dark-bg': '#1D2B3A', 
                        'secondary-light-blue': '#56B5FF', 
                        'text-dark': '#333333',
                        'fundo': '#f8f8f8',
                        'error-red': '#D63B3B'
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f8f8;
        }

        .contador-carrinho {
            position: absolute;
            top: -5px;
            right: -10px;
            background-color: #2E6DA4;
            color: white;
            border-radius: 9999px;
            padding: 0 6px;
            font-size: 0.7em;
            line-height: 1.5;
            font-weight: bold;
            display: none;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2E6DA4;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 1px 2px rgba(0,0,0,0.08);
            white-space: nowrap;
            display: inline-block;
        }

        .status-Pendente { background-color: #FEF3C7; color: #92400E; }
        .status-Em-Processamento { background-color: #DBEAFE; color: #1E40AF; }
        .status-Enviado { background-color: #E0E7FF; color: #3730A3; }
        .status-Entregue { background-color: #D1FAE5; color: #065F46; }
        .status-Cancelado { background-color: #FEE2E2; color: #991B1B; }
        .status-Pendente-de-Pagamento { background-color: #FFEDD5; color: #9A3412; }

        #category-dropdown.active {
            display: block;
            max-height: 500px;
            opacity: 1;
        }

        .category-menu::-webkit-scrollbar {
            display: none;
        }

        .category-menu {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-fundo-claro min-h-screen">
    
    <main id="main-content-container" class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8 min-h-[70vh]" style="display:none;">
        
        <h1 class="text-3xl sm:text-4xl font-extrabold text-text-dark mb-8 border-b pb-4 flex items-center">
            <i class="fas fa-receipt mr-3 text-primary-blue"></i> Histórico de Pedidos
        </h1>

        <div id="loading-area" class="text-center py-20">
            <div class="loader mx-auto"></div>
            <p class="mt-4 text-gray-600">Carregando seus pedidos...</p>
        </div>
        
        <div id="pedidos-lista" class="space-y-6"></div>

        <div id="no-orders-message" class="hidden text-center py-16 bg-white rounded-xl shadow-lg mt-8">
            <i class="fas fa-box-open text-6xl text-gray-300"></i>
            <h2 class="text-2xl font-bold text-gray-700 mt-4">Nenhum pedido encontrado.</h2>
            <p class="text-gray-500 mt-2">Parece que você ainda não fez nenhuma compra. <a href="index.html" class="text-primary-blue font-medium hover:underline">Comece a comprar agora!</a></p>
        </div>

    </main>
    
    <script>
        let userId = null;

        const API_BASE =
            window.API_BASE_URL ||
            window.API_URL ||
            localStorage.getItem('apiBaseUrl') ||
            '/api';

        const loadingArea = document.getElementById('loading-area');
        const pedidosLista = document.getElementById('pedidos-lista');
        const noOrdersMessage = document.getElementById('no-orders-message');

        const catBtn = document.getElementById('category-dropdown-btn');
        const catMenu = document.getElementById('category-dropdown');

        catBtn?.addEventListener('click', (e) => {
            e.stopPropagation();
            catMenu.classList.toggle('hidden');
            catMenu.classList.toggle('active');
        });

        document.addEventListener('click', () => {
            catMenu?.classList.add('hidden');
            catMenu?.classList.remove('active');
        });

        window.applySearchFilter = (event) => {
            event.preventDefault();
            const input = document.getElementById('search-input-desktop');
            const term = input ? input.value.trim() : "";
            if (term) window.location.href = `todos_produtos.html?q=${encodeURIComponent(term)}`;
        };

        function getStoredUser() {
            try {
                return JSON.parse(localStorage.getItem('user') || '{}');
            } catch {
                return {};
            }
        }

        function getAuthToken() {
            return (
                localStorage.getItem('token') ||
                localStorage.getItem('authToken') ||
                localStorage.getItem('accessToken') ||
                ''
            );
        }

        async function apiFetch(path, options = {}) {
            const token = getAuthToken();
            const headers = {
                'Content-Type': 'application/json',
                ...(options.headers || {})
            };

            if (token) {
                headers.Authorization = `Bearer ${token}`;
            }

            const response = await fetch(`${API_BASE}${path}`, {
                ...options,
                headers
            });

            const text = await response.text();
            let data = null;

            try {
                data = text ? JSON.parse(text) : null;
            } catch {
                data = text;
            }

            if (!response.ok) {
                const errorMessage =
                    (data && (data.message || data.error)) ||
                    `Erro HTTP ${response.status}`;
                throw new Error(errorMessage);
            }

            return data;
        }

        async function loadClientAddress(user) {
            const addressSpan = document.querySelector('#client-address-display span');
            if (!addressSpan) return;

            if (user && (user.id || user._id || user.uid)) {
                try {
                    const me = await apiFetch('/auth/me');
                    const addr = me?.address || me?.endereco || me?.user?.address || me?.user?.endereco;

                    if (addr) {
                        const street = addr.street || addr.rua || '';
                        const number = addr.number || addr.numero || '';
                        const city = addr.city || addr.cidade || '';
                        const text = [street, number ? `${number}` : '', city ? `- ${city}` : '']
                            .filter(Boolean)
                            .join(' ')
                            .replace(/\s+-\s+/g, ' - ');

                        if (text.trim()) {
                            addressSpan.textContent = text.trim();
                            return;
                        }
                    }
                } catch (e) {
                    console.error('Erro ao carregar endereço do cliente:', e);
                }
            }

            addressSpan.textContent = "Rua Olegário de Andrade, 54A - Guanhães/MG";
        }

        window.updateClientHeaderUI = (user) => {
            const clientStatusDisplay = document.getElementById('client-status-display');
            const clientAccountLink = document.getElementById('client-account-link');
            if (!clientStatusDisplay || !clientAccountLink) return;

            if (user && (user.id || user._id || user.uid || user.email)) {
                const displayName =
                    user.displayName ||
                    user.name ||
                    user.nome ||
                    (user.email ? user.email.split('@')[0] : 'Cliente');

                clientStatusDisplay.innerHTML = `<span class="text-sm font-semibold">Olá, ${displayName}</span><span class="text-sm text-gray-300">Minha Conta</span>`;
                clientAccountLink.href = 'minha_conta.html';
            } else {
                clientStatusDisplay.innerHTML = `<span class="text-sm font-semibold">Entre ou Cadastre-se</span><span class="text-sm text-gray-300">para ver seus produtos</span>`;
                clientAccountLink.href = 'login_cadastro.html';
            }
        };

        const formatCurrency = (value) => {
            const num = Number(value || 0);
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(num);
        };

        const formatDate = (isoString) => {
            if (!isoString) return 'Data Indisponível';
            const date = new Date(isoString);
            if (isNaN(date.getTime())) return 'Data Indisponível';

            return date.toLocaleDateString('pt-BR', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        };
        
        const createOrderCardHtml = (order) => {
            const rawOrderId = order.orderId || order._id || order.id || 'N/A';
            const displayOrderId = String(rawOrderId).substring(0, 8).toUpperCase();
            const rawStatus = order.status || 'Pendente';
            const statusClass = `status-${String(rawStatus).replace(/\s/g, '-')}`;
            const itens = order.itens || order.items || [];
            const endereco = order.endereco || order.address || {};

            return `
                <div class="bg-white rounded-xl shadow-lg border border-gray-100 transition-all duration-300 hover:shadow-xl">
                    <div class="p-6 border-b border-gray-100 bg-gray-50 flex flex-col sm:flex-row justify-between items-start sm:items-center rounded-t-xl">
                        <div>
                            <h2 class="text-xl font-bold">Pedido #${displayOrderId}</h2>
                            <p class="text-sm text-gray-500">Realizado em: ${formatDate(order.dataCriacao || order.createdAt || order.data)}</p>
                        </div>
                        <span class="${statusClass} status-badge">${rawStatus}</span>
                    </div>
                    <div class="p-6">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <h3 class="font-semibold text-primary-blue mb-2">Entrega</h3>
                                <p class="text-sm">${endereco.rua || endereco.street || 'N/A'}, ${endereco.numero || endereco.number || 'S/N'}</p>
                            </div>
                            <div>
                                <h3 class="font-semibold text-primary-blue mb-2">Pagamento</h3>
                                <p class="text-sm font-bold">${formatCurrency(order.valorTotal || order.total || 0)}</p>
                            </div>
                            <div>
                                <h3 class="font-semibold text-primary-blue mb-2">Itens (${itens.length})</h3>
                                <p class="text-sm">${itens.length > 0 ? (itens[0].nome || itens[0].name || 'Item sem nome') : 'Nenhum item'}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
        };

        async function carregarPedidos(currentUserId) {
            try {
                loadingArea.classList.remove('hidden');
                pedidosLista.innerHTML = '';
                noOrdersMessage.classList.add('hidden');

                let orders = [];

                try {
                    orders = await apiFetch('/pedidos/meus');
                } catch (e1) {
                    console.warn('Falha em /pedidos/meus, tentando rota alternativa:', e1);
                    orders = await apiFetch(`/users/${encodeURIComponent(currentUserId)}/pedidos`);
                }

                if (!Array.isArray(orders)) {
                    orders = orders?.pedidos || orders?.orders || [];
                }

                loadingArea.classList.add('hidden');

                if (!orders.length) {
                    noOrdersMessage.classList.remove('hidden');
                    return;
                }

                pedidosLista.innerHTML = orders.map(createOrderCardHtml).join('');
            } catch (error) {
                console.error('Erro ao carregar pedidos:', error);
                loadingArea.innerHTML = `<p class="text-error-red font-bold">Erro ao carregar seus pedidos.</p>`;
            }
        }

        async function checkAuthAndInit() {
            try {
                const storedUser = getStoredUser();
                const contentContainer = document.getElementById('main-content-container');

                window.updateClientHeaderUI(storedUser);
                loadClientAddress(storedUser);

                userId = storedUser?.id || storedUser?._id || storedUser?.uid || null;

                if (userId) {
                    if (contentContainer) contentContainer.style.display = 'block';
                    await carregarPedidos(userId);
                } else {
                    loadingArea.innerHTML = `<p class="text-error-red font-bold">Acesso Negado. Redirecionando...</p>`;
                    setTimeout(() => window.location.href = 'login_cadastro.html', 2000);
                }
            } catch (error) {
                console.error(error);
                loadingArea.innerHTML = `<p class="text-error-red font-bold">Erro ao iniciar a página.</p>`;
            }
        }

        document.addEventListener('DOMContentLoaded', checkAuthAndInit);
    </script>

    <script src="./header.js"></script>
    <script>
      window.carregarHeader && window.carregarHeader();
    </script>
    <script src="marketplace-core.js"></script>
    <script src="footer.js"></script>
</body>
</html>
